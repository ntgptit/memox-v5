<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--mx-color-background-app); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--mx-color-divider-default); }
  .row:last-child { border-bottom: none; }
  .meta { font: 500 10px var(--mx-font-mono); color: var(--mx-color-text-tertiary); width: 130px; flex: 0 0 130px; }
  .spec { color: var(--mx-color-text-primary); }
</style></head>
<body>
  <div class="row"><span class="meta">display.large<br>40 / 46 · 700</span>
    <span class="spec" style="font-family:var(--mx-font-display);font-size:var(--mx-text-display-large-size);line-height:var(--mx-text-display-large-line);font-weight:700;letter-spacing:var(--mx-text-display-large-tracking)">12 words learned</span></div>
  <div class="row"><span class="meta">title.large<br>26 / 32 · 700</span>
    <span class="spec" style="font-family:var(--mx-font-display);font-size:var(--mx-text-title-large-size);font-weight:700;letter-spacing:var(--mx-text-title-large-tracking)">Deck Management</span></div>
  <div class="row"><span class="meta">title.medium<br>20 / 26 · 600</span>
    <span class="spec" style="font-family:var(--mx-font-display);font-size:var(--mx-text-title-medium-size);font-weight:600">Spaced repetition</span></div>
</body></html>

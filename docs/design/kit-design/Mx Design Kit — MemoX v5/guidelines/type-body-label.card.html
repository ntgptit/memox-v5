<!-- @dsCard group="Type" viewport="700x320" name="Body, Label & Caption" subtitle="Reading content, controls, and metadata" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--mx-color-background-app); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 9px 0; border-bottom: 1px solid var(--mx-color-divider-default); }
  .row:last-child { border-bottom: none; }
  .meta { font: 500 10px var(--mx-font-mono); color: var(--mx-color-text-tertiary); width: 130px; flex: 0 0 130px; }
  .spec { color: var(--mx-color-text-primary); }
</style></head>
<body>
  <div class="row"><span class="meta">body.large<br>17 / 26 · 400</span>
    <span class="spec" style="font-family:var(--mx-font-body);font-size:var(--mx-text-body-large-size);line-height:var(--mx-text-body-large-line)">Long card meanings and explanations read comfortably.</span></div>
  <div class="row"><span class="meta">body.medium<br>15 / 22 · 400</span>
    <span class="spec" style="font-family:var(--mx-font-body);font-size:var(--mx-text-body-medium-size)">Deck row subtitle, settings description.</span></div>
  <div class="row"><span class="meta">label.large<br>15 / 20 · 600</span>
    <span class="spec" style="font-family:var(--mx-font-display);font-size:var(--mx-text-label-large-size);font-weight:600">Start studying</span></div>
  <div class="row"><span class="meta">label.medium<br>13 / 16 · 600</span>
    <span class="spec" style="font-family:var(--mx-font-display);font-size:var(--mx-text-label-medium-size);font-weight:600">DUE 83</span></div>
  <div class="row"><span class="meta">caption<br>12 / 16 · 500</span>
    <span class="spec" style="font-family:var(--mx-font-body);font-size:var(--mx-text-caption-size);color:var(--mx-color-text-tertiary)">Last backup: 1 minute ago</span></div>
</body></html>

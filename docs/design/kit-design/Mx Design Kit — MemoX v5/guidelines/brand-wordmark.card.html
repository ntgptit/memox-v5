<!-- @dsCard group="Brand" viewport="700x220" name="Wordmark" subtitle="No logo asset ships in the repo — MemoX is set in Plus Jakarta Sans (see readme)" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 0; background: var(--mx-color-background-app); height: 220px; display:flex; align-items:center; justify-content:center; gap: 40px; }
  .mark { display:flex; align-items:center; gap: 14px; }
  .glyph { width: 52px; height: 52px; border-radius: 15px; background: var(--mx-color-action-primary); display:flex; align-items:center; justify-content:center; color:#fff; font: 800 30px var(--mx-font-display); }
  .word { font: 800 40px var(--mx-font-display); letter-spacing: -0.02em; color: var(--mx-color-text-primary); }
  .word em { color: var(--mx-color-action-primary); font-style: normal; }
  .light { padding: 22px 28px; border-radius: 20px; background: var(--mx-color-background-app); }
</style></head>
<body>
  <div class="mark">
    <span class="glyph">M</span>
    <span class="word">Memo<em>X</em></span>
  </div>
  <div class="light" data-theme="light">
    <div class="mark">
      <span class="glyph">M</span>
      <span class="word">Memo<em>X</em></span>
    </div>
  </div>
</body></html>

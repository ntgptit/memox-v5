<!-- @dsCard group="Spacing" viewport="700x210" name="Spacing Scale" subtitle="4px grid — the only spacing values screens may use" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--mx-color-background-app); }
  .rows { display:flex; flex-direction:column; gap:7px; }
  .r { display:flex; align-items:center; gap:12px; }
  .r .n { font: 500 10px var(--mx-font-mono); color: var(--mx-color-text-tertiary); width: 96px; flex:0 0 96px; }
  .r .bar { height: 14px; border-radius: 4px; background: var(--mx-color-action-primary); }
</style></head>
<body>
<div class="rows">
  <div class="r"><span class="n">space.4</span><span class="bar" style="width:4px"></span></div>
  <div class="r"><span class="n">space.8</span><span class="bar" style="width:8px"></span></div>
  <div class="r"><span class="n">space.12</span><span class="bar" style="width:12px"></span></div>
  <div class="r"><span class="n">space.16</span><span class="bar" style="width:16px"></span></div>
  <div class="r"><span class="n">space.24</span><span class="bar" style="width:24px"></span></div>
  <div class="r"><span class="n">space.32</span><span class="bar" style="width:32px"></span></div>
  <div class="r"><span class="n">space.48</span><span class="bar" style="width:48px"></span></div>
  <div class="r"><span class="n">space.64</span><span class="bar" style="width:64px"></span></div>
</div>
</body></html>

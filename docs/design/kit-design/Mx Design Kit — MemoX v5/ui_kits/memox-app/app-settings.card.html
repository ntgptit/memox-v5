<!-- @dsCard group="Sample Screens" viewport="430x900" name="App Settings" subtitle="Backup / restore / cloud sync: loaded / backup-states / restore-confirm / restore-failed / cloud-sync / save-failed, dark + light" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<link rel="stylesheet" href="phone.css" />
</head>
<body class="mx-desk">
<div id="root"></div>
<script type="text/babel">
const K = window.MxDesignKitMemoXV5_9f1387;
const { MxTopBar, MxIconButton, MxSettingsSection, MxSettingsRow, MxSwitch, MxBadge, MxActionButton, MxCallout, MxConfirmDialog, MxErrorState } = K;
function Ic({ n, s = 20 }) { return <i data-lucide={n} style={{ width: s, height: s }}></i>; }

function Shell({ theme, children, overlay }) {
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <div className="mx-phone" data-theme={theme === 'light' ? 'light' : undefined}>
      <div className="mx-status"><span>9:41</span><span style={{ display: 'flex', gap: 6 }}><i data-lucide="signal" style={{ width: 15, height: 15 }}></i><i data-lucide="wifi" style={{ width: 15, height: 15 }}></i><i data-lucide="battery-full" style={{ width: 15, height: 15 }}></i></span></div>
      <MxTopBar variant="settings" leading={<MxIconButton icon={<Ic n="chevron-left" />} label="Back" />} title="App settings" />
      <div className="mx-scroll" style={{ padding: '8px 16px 16px', display: 'flex', flexDirection: 'column', gap: 18 }}>{children}</div>
      {overlay}
    </div>
  );
}

function BackupRow() {
  return <MxSettingsRow leading={<Ic n="save" />} title="Back up now" subtitle="Last backup: 2 hours ago"
    control={<MxActionButton size="small" variant="secondary">Back up</MxActionButton>} />;
}
function RestoreRow() {
  return <MxSettingsRow leading={<Ic n="history" />} title="Restore from backup" subtitle="Overwrites current data" tone="destructive" onClick={() => {}} />;
}
function CloudRow() {
  return <MxSettingsRow leading={<Ic n="cloud" />} title="Cloud sync" subtitle="Back up and sync across devices" unavailable />;
}

/* ---- MX-17.1 Loaded ---- */
function LoadedPhone({ theme }) {
  return (
    <Shell theme={theme}>
      <MxSettingsSection title="Backup">
        <BackupRow />
        <MxSettingsRow leading={<Ic n="calendar-clock" />} title="Auto backup" subtitle="Daily · on Wi-Fi" control={<MxSwitch checked label="Auto backup" onChange={() => {}} />} />
      </MxSettingsSection>
      <MxSettingsSection title="Restore" description="High-risk — overwrites data on this device.">
        <RestoreRow />
      </MxSettingsSection>
      <MxSettingsSection title="Sync">
        <CloudRow />
      </MxSettingsSection>
      <MxSettingsSection title="About">
        <MxSettingsRow leading={<Ic n="info" />} title="Version" value="5.0.0" />
        <MxSettingsRow leading={<Ic n="database" />} title="Storage used" value="42 MB" />
      </MxSettingsSection>
    </Shell>
  );
}

/* ---- MX-17.2 Backup states ---- */
function BackupStatesPhone({ theme }) {
  return (
    <Shell theme={theme}>
      <MxSettingsSection title="Backup states" description="Idle → in progress → success / failed.">
        <MxSettingsRow leading={<Ic n="save" />} title="Idle" subtitle="Last backup: 2 hours ago" control={<MxActionButton size="small" variant="secondary">Back up</MxActionButton>} />
        <MxSettingsRow leading={<Ic n="save" />} title="In progress" subtitle="Backing up… 60% · keep the app open" control={<MxActionButton size="small" loading>60%</MxActionButton>} />
        <MxSettingsRow leading={<Ic n="save" />} title="Success" subtitle="Backup complete · just now" control={<MxBadge tone="noDue" size="small" icon={<Ic n="check" s={12} />}>Done</MxBadge>} />
        <MxSettingsRow leading={<Ic n="triangle-alert" />} title="Failed" subtitle="Couldn’t finish — your data is safe" tone="destructive" control={<MxActionButton size="small" variant="secondary" leadingIcon={<Ic n="rotate-cw" s={14} />}>Retry</MxActionButton>} />
      </MxSettingsSection>
    </Shell>
  );
}

/* ---- MX-17.3 Restore confirm ---- */
function RestoreConfirmPhone({ theme }) {
  return (
    <Shell theme={theme}
      overlay={
        <MxConfirmDialog open variant="highRisk"
          title="Restore from backup?"
          message="This replaces everything on this device with the backup from 2 hours ago."
          warning="Any words or reviews added since that backup will be overwritten and can’t be recovered."
          confirmLabel="Overwrite & restore"
          cancelLabel="Cancel" />
      }>
      <MxSettingsSection title="Restore" description="High-risk — overwrites data on this device.">
        <RestoreRow />
      </MxSettingsSection>
      <MxSettingsSection title="Backup"><BackupRow /></MxSettingsSection>
    </Shell>
  );
}

/* ---- MX-17.4 Restore failed ---- */
function RestoreFailedPhone({ theme }) {
  return (
    <Shell theme={theme}>
      <div style={{ minHeight: '58vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <MxErrorState icon={<Ic n="cloud-off" s={40} />} title="Restore didn't finish"
          message="Nothing was changed — your current data is intact and safe on this device. You can try the restore again."
          action={<MxActionButton variant="secondary" leadingIcon={<Ic n="rotate-cw" s={18} />}>Try restore again</MxActionButton>} />
      </div>
    </Shell>
  );
}

/* ---- MX-17.5 Cloud sync (soon / blocked) ---- */
function CloudSyncPhone({ theme }) {
  return (
    <Shell theme={theme}>
      <MxSettingsSection title="Sync">
        <CloudRow />
      </MxSettingsSection>
      <MxCallout tone="unavailable" icon={<Ic n="cloud" s={16} />} title="Cloud sync is coming soon">
        For now MemoX is local-first — your data lives on this device. Use Backup to keep a copy safe until sync arrives.
      </MxCallout>
    </Shell>
  );
}

/* ---- MX-17.6 Save failed ---- */
function SaveFailedPhone({ theme }) {
  return (
    <Shell theme={theme}>
      <MxSettingsSection title="Backup">
        <MxSettingsRow leading={<Ic n="calendar-clock" />} title="Auto backup" subtitle="Daily · on Wi-Fi" control={<MxSwitch checked={false} label="Auto backup" onChange={() => {}} />} />
      </MxSettingsSection>
      <MxErrorState icon={<Ic n="cloud-off" s={36} />} title="Couldn't save that setting"
        message="Your existing settings and data are safe on this device. Check your connection and try again."
        action={<MxActionButton variant="secondary" leadingIcon={<Ic n="rotate-cw" s={18} />}>Retry</MxActionButton>} />
    </Shell>
  );
}

function DeskCaption({ children }) {
  return <div style={{ flexBasis: '100%', maxWidth: '100%', textAlign: 'center', margin: '10px 0 -8px', font: '700 var(--mx-text-body-small-size) var(--mx-font-display)', letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--mx-color-text-tertiary)' }}>{children}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <>
    <DeskCaption>MX-17.1 · Loaded</DeskCaption>
    <LoadedPhone theme="dark" /><LoadedPhone theme="light" />
    <DeskCaption>MX-17.2 · Backup states</DeskCaption>
    <BackupStatesPhone theme="dark" /><BackupStatesPhone theme="light" />
    <DeskCaption>MX-17.3 · Restore confirm (high-risk)</DeskCaption>
    <RestoreConfirmPhone theme="dark" /><RestoreConfirmPhone theme="light" />
    <DeskCaption>MX-17.4 · Restore failed (data safe)</DeskCaption>
    <RestoreFailedPhone theme="dark" /><RestoreFailedPhone theme="light" />
    <DeskCaption>MX-17.5 · Cloud sync (soon)</DeskCaption>
    <CloudSyncPhone theme="dark" /><CloudSyncPhone theme="light" />
    <DeskCaption>MX-17.6 · Save failed</DeskCaption>
    <SaveFailedPhone theme="dark" /><SaveFailedPhone theme="light" />
  </>
);
setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
</script>
</body>
</html>

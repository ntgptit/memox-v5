<!-- @dsCard group="Sample Screens" viewport="430x900" name="Reminder Settings" subtitle="Study reminders form: enabled/disabled / weekday chips / time picker / add / keyboard-safe / permission / save-failed+delete, dark + light" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
<script src="../../../_ds_bundle.js"></script>
<script type="text/babel" src="../_shared/kit-helpers.jsx"></script>
<link rel="stylesheet" href="../_shared/phone.css" />
</head>
<body class="mx-desk">
<div id="root"></div>
<script type="text/babel">
const K = window.MxDesignKitMemoXV5_9f1387;
const { Ic } = window.MxKit;
const { MxTopBar, MxIconButton, MxSettingsSection, MxSettingsRow, MxSwitch, MxReminderRow, MxWeekdayChip, MxModalSheet, MxConfirmDialog, MxCallout, MxActionButton } = K;

const DAYS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
function wd(sel) { return DAYS.map((d, i) => ({ key: d.toLowerCase(), label: d[0], selected: sel.includes(i) })); }

function Keyboard() {
  const rows = ['qwertyuiop', 'asdfghjkl', 'zxcvbnm'];
  return (
    <div aria-hidden="true" style={{ marginTop: 4, padding: '8px 5px calc(8px + env(safe-area-inset-bottom, 0px))', background: 'var(--mx-color-surface-base)', borderTop: '1px solid var(--mx-color-border-subtle)', display: 'flex', flexDirection: 'column', gap: 8 }}>
      {rows.map((r, i) => (
        <div key={i} style={{ display: 'flex', gap: 4, justifyContent: 'center' }}>
          {r.split('').map((c, j) => (
            <span key={j} style={{ flex: '1 1 0', maxWidth: 32, height: 34, display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: 'var(--mx-radius-sm)', background: 'var(--mx-color-surface-card)', border: '1px solid var(--mx-color-border-subtle)', font: '600 14px var(--mx-font-display)', color: 'var(--mx-color-text-secondary)' }}>{c}</span>
          ))}
        </div>
      ))}
    </div>
  );
}
function PickerCol({ values, selected }) {
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
      {values.map(v => (
        <div key={v} style={{ padding: '8px 0', width: '80%', textAlign: 'center', borderRadius: 'var(--mx-radius-sm)', background: v === selected ? 'var(--mx-color-state-selectedSurface)' : 'transparent', color: v === selected ? 'var(--mx-color-text-primary)' : 'var(--mx-color-text-tertiary)', font: `${v === selected ? 700 : 500} ${v === selected ? 22 : 18}px var(--mx-font-mono)` }}>{v}</div>
      ))}
    </div>
  );
}

function Shell({ theme, children, bottom, overlay, keyboard }) {
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <div className="mx-phone" data-theme={theme === 'light' ? 'light' : undefined}>
      <div className="mx-status"><span>9:41</span><span style={{ display: 'flex', gap: 8 }}><i data-lucide="signal" style={{ width: 15, height: 15 }}></i><i data-lucide="wifi" style={{ width: 15, height: 15 }}></i><i data-lucide="battery-full" style={{ width: 15, height: 15 }}></i></span></div>
      <MxTopBar variant="settings" leading={<MxIconButton icon={<Ic n="chevron-left" />} label="Back" />} title="Reminders" />
      <div className="mx-scroll" style={{ padding: '8px 16px 16px', display: 'flex', flexDirection: 'column', gap: 24 }}>{children}</div>
      {bottom && <div className="mx-bottom">{bottom}</div>}
      {keyboard && <Keyboard />}
      {overlay}
    </div>
  );
}

/* ---- MX-19.1 Enabled / disabled ---- */
function EnabledDisabledPhone({ theme }) {
  return (
    <Shell theme={theme}>
      <MxSettingsSection title="Study reminders">
        <MxSettingsRow leading={<Ic n="bell" />} title="Daily reminders" subtitle="On · 2 reminders" control={<MxSwitch checked label="Reminders" onChange={() => {}} />} />
      </MxSettingsSection>
      <MxSettingsSection title="Schedule">
        <MxReminderRow time="13:00" weekdays={wd([0, 1, 2, 3, 4])} enabled onToggleWeekday={() => {}} onToggleEnabled={() => {}} onDelete={() => {}} onEditTime={() => {}} />
        <MxReminderRow time="20:00" weekdays={wd([5, 6])} enabled={false} onToggleWeekday={() => {}} onToggleEnabled={() => {}} onDelete={() => {}} onEditTime={() => {}} />
      </MxSettingsSection>
    </Shell>
  );
}

/* ---- MX-19.2 Weekday chips ---- */
function WeekdayChipsPhone({ theme }) {
  return (
    <Shell theme={theme}>
      <MxSettingsSection title="Repeat on" description="Selected days are highlighted; unselected are muted.">
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', padding: '4px 2px' }}>
          {DAYS.map((d, i) => <MxWeekdayChip key={d} label={d} selected={i < 5} onClick={() => {}} />)}
        </div>
      </MxSettingsSection>
      <MxSettingsSection title="In a reminder">
        <MxReminderRow time="08:30" weekdays={wd([0, 2, 4])} enabled onToggleWeekday={() => {}} onToggleEnabled={() => {}} onDelete={() => {}} onEditTime={() => {}} />
      </MxSettingsSection>
    </Shell>
  );
}

/* ---- MX-19.3 Time picker ---- */
function TimePickerPhone({ theme }) {
  return (
    <Shell theme={theme}
      overlay={
        <MxModalSheet title="Set reminder time" onClose={() => {}}
          actions={<MxActionButton variant="primary" fullWidth>Set 13:00</MxActionButton>}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '4px 24px 12px' }}>
            <PickerCol values={['11', '12', '13', '14', '15']} selected="13" />
            <span style={{ font: '700 22px var(--mx-font-mono)', color: 'var(--mx-color-text-primary)' }}>:</span>
            <PickerCol values={['00', '15', '30', '45']} selected="00" />
          </div>
        </MxModalSheet>
      }>
      <MxSettingsSection title="Schedule">
        <MxReminderRow time="13:00" weekdays={wd([0, 1, 2, 3, 4])} enabled onToggleWeekday={() => {}} onToggleEnabled={() => {}} onDelete={() => {}} onEditTime={() => {}} />
      </MxSettingsSection>
    </Shell>
  );
}

/* ---- MX-19.4 Add reminder ---- */
function AddReminderPhone({ theme }) {
  return (
    <Shell theme={theme}
      bottom={<MxActionButton variant="primary" fullWidth leadingIcon={<Ic n="plus" s={18} />}>Add reminder</MxActionButton>}>
      <MxSettingsSection title="Schedule">
        <MxReminderRow time="13:00" weekdays={wd([0, 1, 2, 3, 4])} enabled onToggleWeekday={() => {}} onToggleEnabled={() => {}} onDelete={() => {}} onEditTime={() => {}} />
        <MxReminderRow time="09:00" weekdays={wd([0, 1, 2, 3, 4, 5, 6])} enabled onToggleWeekday={() => {}} onToggleEnabled={() => {}} onDelete={() => {}} onEditTime={() => {}} />
      </MxSettingsSection>
      <MxCallout tone="info" icon={<Ic n="plus" s={16} />}>A new reminder was added at 09:00, every day — adjust its time and days above.</MxCallout>
    </Shell>
  );
}

/* ---- MX-19.5 Keyboard-safe input ---- */
function KeyboardSafePhone({ theme }) {
  return (
    <Shell theme={theme} keyboard>
      <MxSettingsSection title="Reminder label" description="Optional — shows in the notification.">
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, minHeight: 44, padding: '0 12px', borderRadius: 'var(--mx-radius-md)', background: 'var(--mx-color-surface-card)', border: '1px solid var(--mx-color-state-selected)' }}>
          <span style={{ flex: '1 1 auto', font: '500 var(--mx-text-body-medium-size) var(--mx-font-display)', color: 'var(--mx-color-text-primary)' }}>Morning Korean</span>
          <span style={{ width: 2, height: 20, background: 'var(--mx-color-action-primary)' }} />
        </div>
      </MxSettingsSection>
      <MxSettingsSection title="Schedule">
        <MxReminderRow time="08:00" weekdays={wd([0, 1, 2, 3, 4])} enabled onToggleWeekday={() => {}} onToggleEnabled={() => {}} onDelete={() => {}} onEditTime={() => {}} />
      </MxSettingsSection>
    </Shell>
  );
}

/* ---- MX-19.6a Permission needed ---- */
function PermissionNeededPhone({ theme }) {
  return (
    <Shell theme={theme}>
      <MxCallout tone="warning" icon={<Ic n="bell-ring" s={16} />} title="Turn on notifications">
        Reminders need notification access to reach you. Allow notifications to start getting study nudges.
      </MxCallout>
      <div><MxActionButton variant="primary" leadingIcon={<Ic n="bell" s={18} />}>Allow notifications</MxActionButton></div>
      <MxSettingsSection title="Schedule">
        <MxReminderRow time="13:00" weekdays={wd([0, 1, 2, 3, 4])} enabled={false} onToggleWeekday={() => {}} onToggleEnabled={() => {}} onDelete={() => {}} onEditTime={() => {}} />
      </MxSettingsSection>
    </Shell>
  );
}

/* ---- MX-19.6b Permission blocked ---- */
function PermissionBlockedPhone({ theme }) {
  return (
    <Shell theme={theme}>
      <MxCallout tone="unavailable" icon={<Ic n="bell-off" s={16} />} title="Notifications are off in system settings">
        MemoX can’t send reminders until you turn notifications back on for MemoX in your device settings.
      </MxCallout>
      <div><MxActionButton variant="secondary" leadingIcon={<Ic n="external-link" s={18} />}>Open system settings</MxActionButton></div>
      <MxSettingsSection title="Schedule">
        <MxReminderRow time="13:00" weekdays={wd([0, 1, 2, 3, 4])} enabled={false} onToggleWeekday={() => {}} onToggleEnabled={() => {}} onDelete={() => {}} onEditTime={() => {}} />
      </MxSettingsSection>
    </Shell>
  );
}

/* ---- MX-19.7a Save failed ---- */
function SaveFailedPhone({ theme }) {
  return (
    <Shell theme={theme}>
      <MxCallout tone="destructive" icon={<Ic n="cloud-off" s={16} />} title="Couldn't save reminder">Your existing reminders still work and your settings are safe on this device. Try saving again.</MxCallout>
      <div><MxActionButton variant="secondary" leadingIcon={<Ic n="rotate-cw" s={18} />}>Retry</MxActionButton></div>
      <MxSettingsSection title="Schedule">
        <MxReminderRow time="13:00" weekdays={wd([0, 1, 2, 3, 4])} enabled onToggleWeekday={() => {}} onToggleEnabled={() => {}} onDelete={() => {}} onEditTime={() => {}} />
      </MxSettingsSection>
    </Shell>
  );
}

/* ---- MX-19.7b Delete confirm ---- */
function DeleteConfirmPhone({ theme }) {
  return (
    <Shell theme={theme}
      overlay={
        <MxConfirmDialog open variant="destructive"
          title="Delete this reminder?"
          message="The 13:00 · Mon–Fri reminder will stop notifying you."
          confirmLabel="Delete reminder"
          cancelLabel="Keep it" />
      }>
      <MxSettingsSection title="Schedule">
        <MxReminderRow time="13:00" weekdays={wd([0, 1, 2, 3, 4])} enabled onToggleWeekday={() => {}} onToggleEnabled={() => {}} onDelete={() => {}} onEditTime={() => {}} />
      </MxSettingsSection>
    </Shell>
  );
}

function DeskCaption({ children }) {
  return <div style={{ flexBasis: '100%', maxWidth: '100%', textAlign: 'center', margin: '10px 0 -8px', font: '700 var(--mx-text-body-small-size) var(--mx-font-display)', letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--mx-color-text-tertiary)' }}>{children}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <>
    <DeskCaption>MX-19.1 · Enabled / disabled</DeskCaption>
    <EnabledDisabledPhone theme="dark" /><EnabledDisabledPhone theme="light" />
    <DeskCaption>MX-19.2 · Weekday chips</DeskCaption>
    <WeekdayChipsPhone theme="dark" /><WeekdayChipsPhone theme="light" />
    <DeskCaption>MX-19.3 · Time picker</DeskCaption>
    <TimePickerPhone theme="dark" /><TimePickerPhone theme="light" />
    <DeskCaption>MX-19.4 · Add reminder</DeskCaption>
    <AddReminderPhone theme="dark" /><AddReminderPhone theme="light" />
    <DeskCaption>MX-19.5 · Keyboard-safe input</DeskCaption>
    <KeyboardSafePhone theme="dark" /><KeyboardSafePhone theme="light" />
    <DeskCaption>MX-19.6 · Permission needed</DeskCaption>
    <PermissionNeededPhone theme="dark" /><PermissionNeededPhone theme="light" />
    <DeskCaption>MX-19.6 · Permission blocked</DeskCaption>
    <PermissionBlockedPhone theme="dark" /><PermissionBlockedPhone theme="light" />
    <DeskCaption>MX-19.7 · Save failed</DeskCaption>
    <SaveFailedPhone theme="dark" /><SaveFailedPhone theme="light" />
    <DeskCaption>MX-19.7 · Delete confirm</DeskCaption>
    <DeleteConfirmPhone theme="dark" /><DeleteConfirmPhone theme="light" />
  </>
);
setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
</script>
</body>
</html>

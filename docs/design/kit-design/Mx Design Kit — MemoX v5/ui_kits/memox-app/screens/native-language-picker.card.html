<!-- @dsCard group="Sample Screens" viewport="430x900" name="Native Language Picker" subtitle="Pick the learner's meaning language: loaded / loading / selected / search / search-empty+long-scroll / save-failed+error, dark + light" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
<script src="../../../_ds_bundle.js"></script>
<link rel="stylesheet" href="../_shared/phone.css" />
</head>
<body class="mx-desk">
<div id="root"></div>
<script type="text/babel">
const K = window.MxDesignKitMemoXV5_9f1387;
const { MxTopBar, MxIconButton, MxLanguageRow, MxSettingsSection, MxEmptyState, MxErrorState, MxActionButton, MxCallout } = K;
function Ic({ n, s = 20 }) { return <i data-lucide={n} style={{ width: s, height: s }}></i>; }

const LANGS = [
  { native: 'English', en: 'English', flag: '🇬🇧' },
  { native: 'Tiếng Việt', en: 'Vietnamese', flag: '🇻🇳' },
  { native: '한국어', en: 'Korean', flag: '🇰🇷' },
  { native: '日本語', en: 'Japanese', flag: '🇯🇵' },
  { native: '中文', en: 'Chinese', flag: '🇨🇳' },
  { native: 'Español', en: 'Spanish', flag: '🇪🇸' },
  { native: 'Français', en: 'French', flag: '🇫🇷' },
  { native: 'Deutsch', en: 'German', flag: '🇩🇪' },
];
const LONG = LANGS.concat([
  { native: 'Italiano', en: 'Italian', flag: '🇮🇹' },
  { native: 'Português', en: 'Portuguese', flag: '🇵🇹' },
  { native: 'Русский', en: 'Russian', flag: '🇷🇺' },
  { native: 'العربية', en: 'Arabic', flag: '🇸🇦' },
  { native: 'हिन्दी', en: 'Hindi', flag: '🇮🇳' },
  { native: 'ไทย', en: 'Thai', flag: '🇹🇭' },
  { native: 'Bahasa Indonesia', en: 'Indonesian', flag: '🇮🇩' },
  { native: 'Türkçe', en: 'Turkish', flag: '🇹🇷' },
  { native: 'Nederlands', en: 'Dutch', flag: '🇳🇱' },
  { native: 'Polski', en: 'Polish', flag: '🇵🇱' },
]);
function Flag({ f }) { return <span style={{ fontSize: 24, lineHeight: 1 }}>{f}</span>; }

function SearchField({ value }) {
  const has = value && value.length > 0;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12, minHeight: 44, padding: '0 8px 0 12px', borderRadius: 'var(--mx-radius-md)', background: 'var(--mx-color-surface-card)', border: '1px solid var(--mx-color-border-default)' }}>
      <i data-lucide="search" style={{ width: 18, height: 18, color: 'var(--mx-color-text-tertiary)', flex: '0 0 auto' }}></i>
      <span style={{ flex: '1 1 auto', font: '500 var(--mx-text-body-medium-size) var(--mx-font-display)', color: has ? 'var(--mx-color-text-primary)' : 'var(--mx-color-text-tertiary)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{has ? value : 'Search languages'}</span>
      {has && <MxIconButton icon={<Ic n="x" s={16} />} label="Clear search" variant="ghost" size="small" />}
    </div>
  );
}
function Skel({ w, h, r }) {
  return <div style={{ width: w, height: h, borderRadius: r || 'var(--mx-radius-md)', background: 'var(--mx-color-state-loadingSurface)', flex: '0 0 auto' }} />;
}

function Shell({ theme, query, children }) {
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <div className="mx-phone" data-theme={theme === 'light' ? 'light' : undefined}>
      <div className="mx-status"><span>9:41</span><span style={{ display: 'flex', gap: 8 }}><i data-lucide="signal" style={{ width: 15, height: 15 }}></i><i data-lucide="wifi" style={{ width: 15, height: 15 }}></i><i data-lucide="battery-full" style={{ width: 15, height: 15 }}></i></span></div>
      <MxTopBar variant="settings" leading={<MxIconButton icon={<Ic n="chevron-left" />} label="Back" />} title="Native language" subtitle="Your answer / meaning language" />
      {query !== null && <div style={{ padding: '8px 16px 4px' }}><SearchField value={query} /></div>}
      <div className="mx-scroll" style={{ padding: '8px 16px 16px' }}>{children}</div>
    </div>
  );
}
function List({ items, selected }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      {items.map((l, i) => <MxLanguageRow key={i} nativeName={l.native} secondaryName={l.en} icon={<Flag f={l.flag} />} selected={l.en === selected} onClick={() => {}} />)}
    </div>
  );
}

/* ---- MX-18.1 Loaded list ---- */
function LoadedPhone({ theme }) {
  return <Shell theme={theme} query=""><List items={LANGS} selected="English" /></Shell>;
}

/* ---- MX-18.2 Loading ---- */
function LoadingPhone({ theme }) {
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <Shell theme={theme} query="">
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        {[0, 1, 2, 3, 4, 5].map(i => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 16, padding: '10px 12px', border: '1px solid var(--mx-color-border-subtle)', borderRadius: 'var(--mx-radius-lg)' }}>
            <Skel w={28} h={28} r="999px" />
            <div style={{ flex: '1 1 auto', display: 'flex', flexDirection: 'column', gap: 8 }}><Skel w="45%" h={14} r="var(--mx-radius-sm)" /><Skel w="30%" h={11} r="var(--mx-radius-sm)" /></div>
          </div>
        ))}
      </div>
    </Shell>
  );
}

/* ---- MX-18.3 Selected current ---- */
function SelectedPhone({ theme }) {
  return (
    <Shell theme={theme} query="">
      <MxSettingsSection title="Current">
        <List items={[LANGS[1]]} selected="Vietnamese" />
      </MxSettingsSection>
      <MxSettingsSection title="All languages">
        <List items={LANGS.filter(l => l.en !== 'Vietnamese')} selected="Vietnamese" />
      </MxSettingsSection>
    </Shell>
  );
}

/* ---- MX-18.4 Search active ---- */
function SearchActivePhone({ theme }) {
  const q = 'ja';
  const res = LANGS.filter(l => l.en.toLowerCase().includes(q) || l.native.toLowerCase().includes(q));
  return (
    <Shell theme={theme} query={q}>
      <div style={{ padding: '0 4px 8px', font: '600 var(--mx-text-body-small-size) var(--mx-font-display)', color: 'var(--mx-color-text-tertiary)' }}>{res.length} result for “{q}”</div>
      <List items={res} selected="English" />
    </Shell>
  );
}

/* ---- MX-18.5a Search empty ---- */
function SearchEmptyPhone({ theme }) {
  return (
    <Shell theme={theme} query="klingon">
      <div style={{ minHeight: '52vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <MxEmptyState icon={<Ic n="search-x" s={40} />} title="No languages match “klingon”"
          message="Try a different name, or clear the search to see all languages."
          action={<MxActionButton variant="secondary" leadingIcon={<Ic n="x" s={18} />}>Clear search</MxActionButton>} />
      </div>
    </Shell>
  );
}

/* ---- MX-18.5b Long scroll ---- */
function LongScrollPhone({ theme }) {
  return <Shell theme={theme} query=""><List items={LONG} selected="English" /></Shell>;
}

/* ---- MX-18.6a Save failed ---- */
function SaveFailedPhone({ theme }) {
  return (
    <Shell theme={theme} query="">
      <MxCallout tone="destructive" icon={<Ic n="cloud-off" s={16} />} title="Couldn't save your language">Your previous language is still active and your data is safe. Tap a language to try again.</MxCallout>
      <div style={{ height: 12 }} />
      <List items={LANGS} selected="English" />
    </Shell>
  );
}

/* ---- MX-18.6b Load error ---- */
function LoadErrorPhone({ theme }) {
  return (
    <Shell theme={theme} query={null}>
      <div style={{ minHeight: '58vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <MxErrorState icon={<Ic n="cloud-off" s={40} />} title="Couldn't load languages"
          message="Your current language still works and your data is safe on this device. Check your connection and try again."
          action={<MxActionButton variant="secondary" leadingIcon={<Ic n="rotate-cw" s={18} />}>Retry</MxActionButton>} />
      </div>
    </Shell>
  );
}

function DeskCaption({ children }) {
  return <div style={{ flexBasis: '100%', maxWidth: '100%', textAlign: 'center', margin: '10px 0 -8px', font: '700 var(--mx-text-body-small-size) var(--mx-font-display)', letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--mx-color-text-tertiary)' }}>{children}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <>
    <DeskCaption>MX-18.1 · Loaded list</DeskCaption>
    <LoadedPhone theme="dark" /><LoadedPhone theme="light" />
    <DeskCaption>MX-18.2 · Loading</DeskCaption>
    <LoadingPhone theme="dark" /><LoadingPhone theme="light" />
    <DeskCaption>MX-18.3 · Selected current</DeskCaption>
    <SelectedPhone theme="dark" /><SelectedPhone theme="light" />
    <DeskCaption>MX-18.4 · Search active</DeskCaption>
    <SearchActivePhone theme="dark" /><SearchActivePhone theme="light" />
    <DeskCaption>MX-18.5 · Search empty</DeskCaption>
    <SearchEmptyPhone theme="dark" /><SearchEmptyPhone theme="light" />
    <DeskCaption>MX-18.5 · Long-list scroll</DeskCaption>
    <LongScrollPhone theme="dark" /><LongScrollPhone theme="light" />
    <DeskCaption>MX-18.6 · Save failed</DeskCaption>
    <SaveFailedPhone theme="dark" /><SaveFailedPhone theme="light" />
    <DeskCaption>MX-18.6 · Load error</DeskCaption>
    <LoadErrorPhone theme="dark" /><LoadErrorPhone theme="light" />
  </>
);
setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
</script>
</body>
</html>

<!-- @dsCard group="Sample Screens" viewport="430x900" name="Review Words" subtitle="Read-only flashcard browse — term/meaning per KO→EN; loaded / loading / empty / search / read-only / long content / error / audio-unavailable, dark + light" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
<script src="../../../_ds_bundle.js"></script>
<link rel="stylesheet" href="../_shared/phone.css" />
</head>
<body class="mx-desk">
<div id="root"></div>
<script type="text/babel">
const K = window.MxDesignKitMemoXV5_9f1387;
const { MxTopBar, MxIconButton, MxCard, MxBadge, MxActionButton, MxSectionHeader, MxEmptyState, MxErrorState, MxCallout } = K;
function Ic({ n, s = 20 }) { return <i data-lucide={n} style={{ width: s, height: s }}></i>; }

/* ---- screen-specific helpers (non-Mx, token-only) ---- */

function SearchField({ value }) {
  const has = value && value.length > 0;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12, minHeight: 44, padding: '0 8px 0 12px', borderRadius: 'var(--mx-radius-md)', background: 'var(--mx-color-surface-card)', border: '1px solid var(--mx-color-border-default)' }}>
      <i data-lucide="search" style={{ width: 18, height: 18, color: 'var(--mx-color-text-tertiary)', flex: '0 0 auto' }}></i>
      <span style={{ flex: '1 1 auto', font: '500 var(--mx-text-body-medium-size) var(--mx-font-display)', color: has ? 'var(--mx-color-text-primary)' : 'var(--mx-color-text-tertiary)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{has ? value : 'Search words'}</span>
      {has && <MxIconButton icon={<Ic n="x" s={16} />} label="Clear search" variant="ghost" size="small" />}
    </div>
  );
}

function ControlArea({ query, count }) {
  return (
    <div style={{ padding: '8px 16px 4px', display: 'flex', flexDirection: 'column', gap: 12 }}>
      <SearchField value={query} />
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <MxBadge tone="active" icon={<i data-lucide="arrow-right" style={{ width: 13, height: 13 }}></i>}>KO → EN</MxBadge>
        <span style={{ font: '600 var(--mx-text-body-small-size) var(--mx-font-display)', color: 'var(--mx-color-text-tertiary)' }}>{count}</span>
      </div>
    </div>
  );
}

function Flashcard({ c, audioOff }) {
  return (
    <MxCard padding="16" style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 12 }}>
        <div style={{ minWidth: 0, flex: '1 1 auto' }}>
          <div className="mx-korean" style={{ font: '700 var(--mx-text-title-medium-size)/1.3 var(--mx-font-display)', color: 'var(--mx-color-text-primary)', overflowWrap: 'anywhere' }}>{c.term}</div>
          {c.reading && <div style={{ marginTop: 2, font: '500 var(--mx-text-body-small-size) var(--mx-font-mono)', color: 'var(--mx-color-text-tertiary)' }}>{c.reading}</div>}
        </div>
        <MxIconButton icon={<Ic n={audioOff ? 'volume-x' : 'volume-2'} s={18} />} label={audioOff ? 'Audio not available yet' : `Play audio for ${c.term}`} variant="ghost" disabled={audioOff} />
      </div>
      <div style={{ font: '500 var(--mx-text-body-large-size)/1.4 var(--mx-font-display)', color: 'var(--mx-color-text-secondary)', overflowWrap: 'anywhere' }}>{c.meaning}</div>
      {c.note && <div style={{ font: '500 var(--mx-text-body-small-size)/1.45 var(--mx-font-display)', color: 'var(--mx-color-text-tertiary)', overflowWrap: 'anywhere' }}>{c.note}</div>}
      {audioOff && <div style={{ marginTop: 2 }}><MxBadge tone="neutral" size="small" icon={<Ic n="clock" s={12} />}>Audio soon</MxBadge></div>}
    </MxCard>
  );
}

function Skel({ w, h, r }) {
  return <div style={{ width: w, height: h, borderRadius: r || 'var(--mx-radius-md)', background: 'var(--mx-color-state-loadingSurface)', flex: '0 0 auto' }} />;
}

/* ---- data (KO → EN) ---- */
const cards = [
  { term: '안녕하세요', reading: 'annyeonghaseyo', meaning: 'Hello / Good day', note: 'Formal greeting' },
  { term: '감사합니다', reading: 'gamsahamnida', meaning: 'Thank you', note: 'Formal' },
  { term: '먹다', reading: 'meokda', meaning: 'To eat', note: 'Verb · dictionary form' },
  { term: '가다', reading: 'gada', meaning: 'To go' },
  { term: '오다', reading: 'oda', meaning: 'To come' },
];
const longCard = {
  term: '저는 매일 아침에 커피를 마시면서 창밖을 바라보는 것을 정말 좋아합니다',
  reading: 'jeoneun maeil achime keopireul masimyeonseo changbakkeul baraboneun geoseul jeongmal joahamnida',
  meaning: 'I really like looking out the window while drinking coffee every morning before I start my day.',
  note: 'Example sentence — long Korean prompt, English meaning and note all wrap across multiple lines inside the card without clipping.',
};

/* ---- shared shell (read-only browse) ---- */
function Shell({ theme, children }) {
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <div className="mx-phone" data-theme={theme === 'light' ? 'light' : undefined}>
      <div className="mx-status"><span>9:41</span><span style={{ display: 'flex', gap: 8 }}><i data-lucide="signal" style={{ width: 15, height: 15 }}></i><i data-lucide="wifi" style={{ width: 15, height: 15 }}></i><i data-lucide="battery-full" style={{ width: 15, height: 15 }}></i></span></div>
      <MxTopBar
        leading={<MxIconButton icon={<Ic n="chevron-left" />} label="Back" />}
        title="Review words"
        subtitle="Korean TOPIK I"
        actions={<MxBadge tone="neutral" icon={<Ic n="eye" s={13} />}>Read-only</MxBadge>} />
      <div className="mx-scroll">{children}</div>
    </div>
  );
}
function CardList({ children }) {
  return <div style={{ padding: '8px 16px 24px', display: 'flex', flexDirection: 'column', gap: 12 }}>{children}</div>;
}
function Centered({ children }) {
  return <div style={{ minHeight: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '0 16px' }}>{children}</div>;
}

/* ---- MX-04.1 Loaded browse ---- */
function LoadedPhone({ theme }) {
  return (
    <Shell theme={theme}>
      <ControlArea query="" count={`${cards.length} words`} />
      <CardList>{cards.map((c, i) => <Flashcard key={i} c={c} />)}</CardList>
    </Shell>
  );
}

/* ---- MX-04.2 Loading ---- */
function LoadingPhone({ theme }) {
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <Shell theme={theme}>
      <div style={{ padding: '8px 16px 4px', display: 'flex', flexDirection: 'column', gap: 12 }}>
        <Skel w="100%" h={44} r="var(--mx-radius-md)" />
        <div style={{ display: 'flex', justifyContent: 'space-between' }}><Skel w={96} h={26} r="999px" /><Skel w={64} h={16} r="var(--mx-radius-sm)" /></div>
      </div>
      <CardList>
        {[0, 1, 2, 3].map(i => (
          <div key={i} style={{ display: 'flex', flexDirection: 'column', gap: 8, padding: 16, border: '1px solid var(--mx-color-border-subtle)', borderRadius: 'var(--mx-radius-lg)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between' }}><Skel w={120} h={22} r="var(--mx-radius-sm)" /><Skel w={36} h={36} r="var(--mx-radius-md)" /></div>
            <Skel w="55%" h={14} r="var(--mx-radius-sm)" />
          </div>
        ))}
      </CardList>
    </Shell>
  );
}

/* ---- MX-04.3 Empty scope ---- */
function EmptyPhone({ theme }) {
  return (
    <Shell theme={theme}>
      <Centered>
        <MxEmptyState icon={<Ic n="book-open" s={40} />} title="No words to review"
          message="This deck has no cards yet. Add some cards, then come back to browse them here."
          action={<MxActionButton variant="secondary" leadingIcon={<Ic n="plus" s={18} />}>Add cards</MxActionButton>} />
      </Centered>
    </Shell>
  );
}

/* ---- MX-04.4 Search active ---- */
function SearchActivePhone({ theme }) {
  const q = 'to';
  const results = cards.filter(c => c.meaning.toLowerCase().includes(q));
  return (
    <Shell theme={theme}>
      <ControlArea query={q} count={`${results.length} of ${cards.length}`} />
      <div style={{ padding: '4px 16px 0', font: '600 var(--mx-text-body-small-size) var(--mx-font-display)', color: 'var(--mx-color-text-tertiary)' }}>{results.length} results for “{q}”</div>
      <CardList>{results.map((c, i) => <Flashcard key={i} c={c} />)}</CardList>
    </Shell>
  );
}

/* ---- MX-04.5 Search empty ---- */
function SearchEmptyPhone({ theme }) {
  return (
    <Shell theme={theme}>
      <ControlArea query="pizza" count={`0 of ${cards.length}`} />
      <Centered>
        <MxEmptyState icon={<Ic n="search-x" s={40} />} title="No words match “pizza”"
          message="Try a different word, or clear the search to browse all cards."
          action={<MxActionButton variant="secondary" leadingIcon={<Ic n="x" s={18} />}>Clear search</MxActionButton>} />
      </Centered>
    </Shell>
  );
}

/* ---- MX-04.6 Read-only affordance ---- */
function ReadOnlyPhone({ theme }) {
  return (
    <Shell theme={theme}>
      <ControlArea query="" count={`${cards.length} words`} />
      <div style={{ padding: '4px 16px 0' }}>
        <MxCallout tone="info" icon={<Ic n="eye" s={16} />} title="Review mode — read-only">
          Browsing doesn’t change anything. Start a study session from the deck to update your learning.
        </MxCallout>
      </div>
      <CardList>{cards.slice(0, 3).map((c, i) => <Flashcard key={i} c={c} />)}</CardList>
    </Shell>
  );
}

/* ---- MX-04.7 Long content wrapping ---- */
function LongContentPhone({ theme }) {
  return (
    <Shell theme={theme}>
      <ControlArea query="" count="1 word" />
      <CardList>
        <Flashcard c={longCard} />
        <Flashcard c={cards[0]} />
      </CardList>
    </Shell>
  );
}

/* ---- MX-04.8a Error ---- */
function ErrorPhone({ theme }) {
  return (
    <Shell theme={theme}>
      <Centered>
        <MxErrorState icon={<Ic n="cloud-off" s={40} />} title="Couldn't load words"
          message="Your cards are safe on this device. Check your connection and try again."
          action={<MxActionButton variant="secondary" leadingIcon={<Ic n="rotate-cw" s={18} />}>Retry</MxActionButton>} />
      </Centered>
    </Shell>
  );
}

/* ---- MX-04.8b Audio unavailable ---- */
function AudioOffPhone({ theme }) {
  return (
    <Shell theme={theme}>
      <ControlArea query="" count={`${cards.length} words`} />
      <div style={{ padding: '4px 16px 0' }}>
        <MxCallout tone="unavailable" icon={<Ic n="volume-x" s={16} />} title="Audio not available yet">
          Pronunciation audio is coming in a later version. Everything else in Review works as usual.
        </MxCallout>
      </div>
      <CardList>{cards.slice(0, 3).map((c, i) => <Flashcard key={i} c={c} audioOff />)}</CardList>
    </Shell>
  );
}

/* ---- desk grouping caption ---- */
function DeskCaption({ children }) {
  return <div style={{ flexBasis: '100%', maxWidth: '100%', textAlign: 'center', margin: '10px 0 -8px', font: '700 var(--mx-text-body-small-size) var(--mx-font-display)', letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--mx-color-text-tertiary)' }}>{children}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <>
    <DeskCaption>MX-04.1 · Loaded browse</DeskCaption>
    <LoadedPhone theme="dark" /><LoadedPhone theme="light" />
    <DeskCaption>MX-04.2 · Loading</DeskCaption>
    <LoadingPhone theme="dark" /><LoadingPhone theme="light" />
    <DeskCaption>MX-04.3 · Empty — no words</DeskCaption>
    <EmptyPhone theme="dark" /><EmptyPhone theme="light" />
    <DeskCaption>MX-04.4 · Search active</DeskCaption>
    <SearchActivePhone theme="dark" /><SearchActivePhone theme="light" />
    <DeskCaption>MX-04.5 · Search empty</DeskCaption>
    <SearchEmptyPhone theme="dark" /><SearchEmptyPhone theme="light" />
    <DeskCaption>MX-04.6 · Read-only affordance</DeskCaption>
    <ReadOnlyPhone theme="dark" /><ReadOnlyPhone theme="light" />
    <DeskCaption>MX-04.7 · Long content wrapping</DeskCaption>
    <LongContentPhone theme="dark" /><LongContentPhone theme="light" />
    <DeskCaption>MX-04.8 · Load error</DeskCaption>
    <ErrorPhone theme="dark" /><ErrorPhone theme="light" />
    <DeskCaption>MX-04.8 · Audio unavailable</DeskCaption>
    <AudioOffPhone theme="dark" /><AudioOffPhone theme="light" />
  </>
);
setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
</script>
</body>
</html>

<!-- @dsCard group="Sample Screens" viewport="430x900" name="New Learning — Match" subtitle="matchMode (mode 2/5): prompt↔meaning tiles; default / selected / correct / wrong / completed / loading-error, dark + light" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
<script src="../../../_ds_bundle.js"></script>
<link rel="stylesheet" href="../_shared/phone.css" />
</head>
<body class="mx-desk">
<div id="root"></div>
<script type="text/babel">
const K = window.MxDesignKitMemoXV5_9f1387;
const { MxTopBar, MxIconButton, MxStudyProgressBar, MxMatchTile, MxActionButton, MxBadge, MxCallout, MxErrorState } = K;
function Ic({ n, s = 20 }) { return <i data-lucide={n} style={{ width: s, height: s }}></i>; }

function Skel({ w, h, r }) {
  return <div style={{ width: w, height: h, borderRadius: r || 'var(--mx-radius-md)', background: 'var(--mx-color-state-loadingSurface)', flex: '0 0 auto' }} />;
}

/* Tile with optional status glyph so correct/wrong never rely on colour alone. */
function Tile({ side, state, children }) {
  const glyph = state === 'correct' ? 'check' : state === 'wrong' ? 'x' : null;
  const inactive = state === 'completed';
  return (
    <MxMatchTile side={side} state={state} onClick={inactive ? undefined : () => {}}
      style={{ minHeight: 64, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
      {glyph && <i data-lucide={glyph} style={{ width: 15, height: 15 }}></i>}
      <span className={side === 'prompt' ? 'mx-korean' : undefined}>{children}</span>
    </MxMatchTile>
  );
}

/* ---- study shell ---- */
function StudyShell({ theme, step, percent, feedback, children, bottom }) {
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <div className="mx-phone" data-theme={theme === 'light' ? 'light' : undefined}>
      <div className="mx-status"><span>9:41</span><span style={{ display: 'flex', gap: 8 }}><i data-lucide="signal" style={{ width: 15, height: 15 }}></i><i data-lucide="wifi" style={{ width: 15, height: 15 }}></i><i data-lucide="battery-full" style={{ width: 15, height: 15 }}></i></span></div>
      <MxTopBar variant="study" leading={<MxIconButton icon={<Ic n="x" />} label="Exit match" />} title="Match" />
      {typeof percent === 'number' && (
        <div style={{ padding: '0 16px' }}><MxStudyProgressBar percent={percent} modeLabel="Match" stepLabel={step} /></div>
      )}
      <div className="mx-scroll" style={{ padding: '16px', display: 'flex', flexDirection: 'column', gap: 24 }}>
        <div style={{ textAlign: 'center', font: '500 var(--mx-text-body-small-size) var(--mx-font-display)', color: 'var(--mx-color-text-tertiary)' }}>Tap a word, then its meaning</div>
        {children}
        {feedback}
      </div>
      {bottom !== null && <div className="mx-bottom">{bottom}</div>}
    </div>
  );
}

/* Board: left = KO prompts, right = EN meanings (shuffled). states = {promptKey|meaningKey: state} */
function Board({ states = {} }) {
  const prompts = [['a', '물'], ['b', '학교'], ['c', '사랑'], ['d', '시간']];
  const meanings = [['b', 'School'], ['d', 'Time'], ['a', 'Water'], ['c', 'Love']];
  return (
    <div style={{ display: 'flex', gap: 12 }}>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 12 }}>
        {prompts.map(([k, v]) => <Tile key={k} side="prompt" state={states['p_' + k] || 'default'}>{v}</Tile>)}
      </div>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 12 }}>
        {meanings.map(([k, v]) => <Tile key={k} side="meaning" state={states['m_' + k] || 'default'}>{v}</Tile>)}
      </div>
    </div>
  );
}

/* ---- MX-07.1 Default tiles ---- */
function DefaultPhone({ theme }) {
  return <StudyShell theme={theme} step="0 / 4 matched" percent={0} bottom={null}><Board /></StudyShell>;
}

/* ---- MX-07.2 Selected ---- */
function SelectedPhone({ theme }) {
  return (
    <StudyShell theme={theme} step="0 / 4 matched" percent={0} bottom={null}
      feedback={<div style={{ display: 'flex', justifyContent: 'center' }}><MxBadge tone="info" icon={<Ic n="hand" s={13} />}>“사랑” selected — pick its meaning</MxBadge></div>}>
      <Board states={{ p_c: 'selected' }} />
    </StudyShell>
  );
}

/* ---- MX-07.3 Correct pair ---- */
function CorrectPhone({ theme }) {
  return (
    <StudyShell theme={theme} step="1 / 4 matched" percent={25} bottom={null}
      feedback={<MxCallout tone="info" icon={<Ic n="check" s={16} />} title="Matched!">“물” = Water. Keep going.</MxCallout>}>
      <Board states={{ p_a: 'correct', m_a: 'correct' }} />
    </StudyShell>
  );
}

/* ---- MX-07.4 Wrong pair ---- */
function WrongPhone({ theme }) {
  return (
    <StudyShell theme={theme} step="0 / 4 matched" percent={0} bottom={null}
      feedback={<MxCallout tone="destructive" icon={<Ic n="x" s={16} />} title="Not a match">“학교” isn’t “Time”. The tiles reset — try again.</MxCallout>}>
      <Board states={{ p_b: 'wrong', m_d: 'wrong' }} />
    </StudyShell>
  );
}

/* ---- MX-07.5 Completed / disabled ---- */
function CompletedPhone({ theme }) {
  return (
    <StudyShell theme={theme} step="4 / 4 matched" percent={100}
      bottom={<MxActionButton variant="primary" fullWidth trailingIcon={<Ic n="arrow-right" s={18} />}>Continue</MxActionButton>}
      feedback={<MxCallout tone="noDue" icon={<Ic n="party-popper" s={16} />} title="All matched">Every pair is matched — nice work.</MxCallout>}>
      <Board states={{ p_a: 'completed', p_b: 'completed', p_c: 'completed', p_d: 'completed', m_a: 'completed', m_b: 'completed', m_c: 'completed', m_d: 'completed' }} />
    </StudyShell>
  );
}

/* ---- MX-07.6 Loading ---- */
function LoadingPhone({ theme }) {
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <StudyShell theme={theme} percent={undefined} bottom={null}>
      <div style={{ display: 'flex', gap: 12 }}>
        {[0, 1].map(col => (
          <div key={col} style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 12 }}>
            {[0, 1, 2, 3].map(i => <Skel key={i} w="100%" h={64} r="var(--mx-radius-md)" />)}
          </div>
        ))}
      </div>
      <div style={{ textAlign: 'center', font: '500 var(--mx-text-body-small-size) var(--mx-font-display)', color: 'var(--mx-color-text-tertiary)' }}>Shuffling tiles…</div>
    </StudyShell>
  );
}

/* ---- MX-07.6 Error ---- */
function ErrorPhone({ theme }) {
  return (
    <StudyShell theme={theme} percent={undefined} bottom={null}>
      <div style={{ minHeight: '60vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <MxErrorState icon={<Ic n="cloud-off" s={40} />} title="Couldn't start match"
          message="Your words and progress are safe on this device. Check your connection and try again."
          action={<MxActionButton variant="secondary" leadingIcon={<Ic n="rotate-cw" s={18} />}>Retry</MxActionButton>} />
      </div>
    </StudyShell>
  );
}

function DeskCaption({ children }) {
  return <div style={{ flexBasis: '100%', maxWidth: '100%', textAlign: 'center', margin: '10px 0 -8px', font: '700 var(--mx-text-body-small-size) var(--mx-font-display)', letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--mx-color-text-tertiary)' }}>{children}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <>
    <DeskCaption>MX-07.1 · Default tiles</DeskCaption>
    <DefaultPhone theme="dark" /><DefaultPhone theme="light" />
    <DeskCaption>MX-07.2 · Selected (not correct)</DeskCaption>
    <SelectedPhone theme="dark" /><SelectedPhone theme="light" />
    <DeskCaption>MX-07.3 · Correct pair</DeskCaption>
    <CorrectPhone theme="dark" /><CorrectPhone theme="light" />
    <DeskCaption>MX-07.4 · Wrong pair</DeskCaption>
    <WrongPhone theme="dark" /><WrongPhone theme="light" />
    <DeskCaption>MX-07.5 · Completed / disabled</DeskCaption>
    <CompletedPhone theme="dark" /><CompletedPhone theme="light" />
    <DeskCaption>MX-07.6 · Loading</DeskCaption>
    <LoadingPhone theme="dark" /><LoadingPhone theme="light" />
    <DeskCaption>MX-07.6 · Error</DeskCaption>
    <ErrorPhone theme="dark" /><ErrorPhone theme="light" />
  </>
);
setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
</script>
</body>
</html>

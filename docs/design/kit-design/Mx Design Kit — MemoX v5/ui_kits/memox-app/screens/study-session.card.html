<!-- @dsCard group="Sample Screens" viewport="430x900" name="New Learning — Fill" subtitle="fillMode (mode 5/5, SRS activation gate): type the prompt; audit / empty / typing / hint-check / correct / wrong / finalize-failed, dark + light" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
<script src="../../../_ds_bundle.js"></script>
<link rel="stylesheet" href="../_shared/phone.css" />
</head>
<body class="mx-desk">
<div id="root"></div>
<script type="text/babel">
const K = window.MxDesignKitMemoXV5_9f1387;
const { MxTopBar, MxIconButton, MxStudyProgressBar, MxStudyCard, MxFillInputPanel, MxActionButton, MxBadge, MxCallout, MxErrorState } = K;
function Ic({ n, s = 20 }) { return <i data-lucide={n} style={{ width: s, height: s }}></i>; }

const MEANING = 'To pay';
const ANSWER = '결제하다';

/* Faux on-screen keyboard to show the layout stays keyboard-safe (screen-specific, tokens only). */
function Keyboard() {
  const rows = ['ㅂㅈㄷㄱㅅㅛㅕㅑㅐㅔ', 'ㅁㄴㅇㄹㅎㅗㅓㅏㅣ', 'ㅋㅌㅊㅍㅠㅜㅡ'];
  return (
    <div aria-hidden="true" style={{ marginTop: 4, padding: '8px 6px calc(8px + env(safe-area-inset-bottom, 0px))', background: 'var(--mx-color-surface-base)', borderTop: '1px solid var(--mx-color-border-subtle)', display: 'flex', flexDirection: 'column', gap: 8 }}>
      {rows.map((r, i) => (
        <div key={i} style={{ display: 'flex', gap: 4, justifyContent: 'center' }}>
          {r.split('').map((c, j) => (
            <span key={j} className="mx-korean" style={{ flex: '1 1 0', maxWidth: 30, minWidth: 0, height: 34, display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: 'var(--mx-radius-sm)', background: 'var(--mx-color-surface-card)', border: '1px solid var(--mx-color-border-subtle)', font: '600 15px var(--mx-font-display)', color: 'var(--mx-color-text-secondary)' }}>{c}</span>
          ))}
        </div>
      ))}
    </div>
  );
}
function Skel({ w, h, r }) {
  return <div style={{ width: w, height: h, borderRadius: r || 'var(--mx-radius-md)', background: 'var(--mx-color-state-loadingSurface)', flex: '0 0 auto' }} />;
}

function StudyShell({ theme, step, percent, keyboard, children, bottom }) {
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <div className="mx-phone" data-theme={theme === 'light' ? 'light' : undefined}>
      <div className="mx-status"><span>9:41</span><span style={{ display: 'flex', gap: 8 }}><i data-lucide="signal" style={{ width: 15, height: 15 }}></i><i data-lucide="wifi" style={{ width: 15, height: 15 }}></i><i data-lucide="battery-full" style={{ width: 15, height: 15 }}></i></span></div>
      <MxTopBar variant="study" leading={<MxIconButton icon={<Ic n="x" />} label="Exit fill" />} title="Fill"
        actions={<MxIconButton icon={<Ic n="volume-2" s={18} />} label="Play audio" variant="ghost" />} />
      {typeof percent === 'number' && (
        <div style={{ padding: '0 16px' }}><MxStudyProgressBar percent={percent} modeLabel="Fill · 5/5" stepLabel={step} /></div>
      )}
      <div className="mx-scroll" style={{ padding: '16px', display: 'flex', flexDirection: 'column', gap: 24 }}>{children}</div>
      {bottom && <div className="mx-bottom">{bottom}</div>}
      {keyboard && <Keyboard />}
    </div>
  );
}
function Answer() {
  return <MxStudyCard variant="answer" meaning={MEANING} note="Type the Korean word" onAudio={() => {}} />;
}

/* ---- MX-10.1 Audit existing fill (loaded, ready) ---- */
function AuditPhone({ theme }) {
  return (
    <StudyShell theme={theme} step="9 / 12" percent={75}>
      <Answer />
      <MxFillInputPanel value="결제하다" state="idle" onHint={() => {}} onCheck={() => {}} />
    </StudyShell>
  );
}

/* ---- MX-10.2 Empty input ---- */
function EmptyPhone({ theme }) {
  return (
    <StudyShell theme={theme} step="9 / 12" percent={75}>
      <Answer />
      <MxFillInputPanel value="" state="idle" onHint={() => {}} onCheck={() => {}} />
    </StudyShell>
  );
}

/* ---- MX-10.3 Typing (keyboard-safe) ---- */
function TypingPhone({ theme }) {
  return (
    <StudyShell theme={theme} step="9 / 12" percent={75} keyboard>
      <Answer />
      <MxFillInputPanel value="결제" state="idle" onHint={() => {}} onCheck={() => {}} />
    </StudyShell>
  );
}

/* ---- MX-10.4 Hint / checking ---- */
function HintPhone({ theme }) {
  return (
    <StudyShell theme={theme} step="9 / 12" percent={75}
      bottom={<MxActionButton variant="primary" fullWidth loading>Checking…</MxActionButton>}>
      <Answer />
      <MxCallout tone="info" icon={<Ic n="lightbulb" s={16} />} title="Hint">Starts with “결” and has 4 syllables.</MxCallout>
      <MxFillInputPanel value="결제하다" state="idle" onHint={() => {}} onCheck={() => {}} />
    </StudyShell>
  );
}

/* ---- MX-10.5 Correct (activates card) ---- */
function CorrectPhone({ theme }) {
  return (
    <StudyShell theme={theme} step="9 / 12" percent={75}
      bottom={<MxActionButton variant="primary" fullWidth trailingIcon={<Ic n="arrow-right" s={18} />}>Next word</MxActionButton>}>
      <Answer />
      <MxFillInputPanel value="결제하다" state="correct" onHint={() => {}} onCheck={() => {}} />
      <MxCallout tone="noDue" icon={<Ic n="party-popper" s={16} />} title="Learned!">All 5 modes done — this word joins spaced repetition (Box 1).</MxCallout>
    </StudyShell>
  );
}

/* ---- MX-10.6 Wrong (+ correct shown + retry) ---- */
function WrongPhone({ theme }) {
  return (
    <StudyShell theme={theme} step="9 / 12" percent={75}>
      <Answer />
      <MxFillInputPanel value="결재하다" state="wrong" expected={ANSWER} onHint={() => {}} onCheck={() => {}} onRetry={() => {}} />
      <MxCallout tone="destructive" icon={<Ic n="x" s={16} />} title="Not quite">You wrote “결재하다”. The correct spelling is “결제하다” — try again.</MxCallout>
    </StudyShell>
  );
}

/* ---- MX-10.7 Finalize failed ---- */
function FinalizeFailedPhone({ theme }) {
  return (
    <StudyShell theme={theme} step="9 / 12" percent={75}
      bottom={<MxActionButton variant="primary" fullWidth leadingIcon={<Ic n="rotate-cw" s={18} />}>Retry saving</MxActionButton>}>
      <Answer />
      <MxFillInputPanel value="결제하다" state="correct" onHint={() => {}} onCheck={() => {}} />
      <MxCallout tone="destructive" icon={<Ic n="cloud-off" s={16} />} title="Couldn't save your progress">
        Your answer is correct and safe on this device — we just couldn’t finish saving. Retry to activate this word.
      </MxCallout>
    </StudyShell>
  );
}

function DeskCaption({ children }) {
  return <div style={{ flexBasis: '100%', maxWidth: '100%', textAlign: 'center', margin: '10px 0 -8px', font: '700 var(--mx-text-body-small-size) var(--mx-font-display)', letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--mx-color-text-tertiary)' }}>{children}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <>
    <DeskCaption>MX-10.1 · Audit — loaded fill</DeskCaption>
    <AuditPhone theme="dark" /><AuditPhone theme="light" />
    <DeskCaption>MX-10.2 · Empty input</DeskCaption>
    <EmptyPhone theme="dark" /><EmptyPhone theme="light" />
    <DeskCaption>MX-10.3 · Typing (keyboard-safe)</DeskCaption>
    <TypingPhone theme="dark" /><TypingPhone theme="light" />
    <DeskCaption>MX-10.4 · Hint / checking</DeskCaption>
    <HintPhone theme="dark" /><HintPhone theme="light" />
    <DeskCaption>MX-10.5 · Correct (activates card)</DeskCaption>
    <CorrectPhone theme="dark" /><CorrectPhone theme="light" />
    <DeskCaption>MX-10.6 · Wrong (+ correct + retry)</DeskCaption>
    <WrongPhone theme="dark" /><WrongPhone theme="light" />
    <DeskCaption>MX-10.7 · Finalize failed (data safe)</DeskCaption>
    <FinalizeFailedPhone theme="dark" /><FinalizeFailedPhone theme="light" />
  </>
);
setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
</script>
</body>
</html>

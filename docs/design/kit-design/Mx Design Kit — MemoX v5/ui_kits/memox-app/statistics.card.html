<!-- @dsCard group="Sample Screens" viewport="430x900" name="Statistics" subtitle="Bazar-language stats — hero header, underline tabs, metrics, chart, bottom nav (light-first)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<link rel="stylesheet" href="phone.css" />
</head>
<body class="mx-desk">
<div id="root"></div>
<script type="text/babel">
const K = window.MxDesignKitMemoXV5_9f1387;
const { MxTopBar, MxIconButton, MxTabs, MxMetricCard, MxStatsChartPanel, MxSectionHeader, MxBottomNav } = K;
function Ic({ n, s = 20 }) { return <i data-lucide={n} style={{ width: s, height: s }}></i>; }

function App() {
  const [tab, setTab] = React.useState('Quality');
  const [nav, setNav] = React.useState('stats');
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <div className="mx-phone" data-theme="light">
      <div className="mx-status"><span>9:41</span><span style={{display:'flex',gap:6}}><i data-lucide="wifi" style={{width:15,height:15}}></i><i data-lucide="battery-full" style={{width:15,height:15}}></i></span></div>
      <MxTopBar variant="settings" title="Statistics" actions={<MxIconButton icon={<Ic n="sliders-horizontal" s={18} />} label="Scope" />} />
      <div className="mx-scroll" style={{ padding: '4px 16px 12px', display: 'flex', flexDirection: 'column', gap: 16 }}>
        <MxSectionHeader size="hero" eyebrow="Last 30 days" title="Your progress" style={{ margin: '4px 4px 4px' }} />
        <MxTabs options={["Words","Time","Quality"]} value={tab} onChange={setTab} />
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
          <MxMetricCard label="Correct" value={342} tone="correct" delta={18} />
          <MxMetricCard label="Wrong" value={57} tone="wrong" delta={-4} />
        </div>
        <MxStatsChartPanel title="Quality by day"
          xLabels={["Mon","Tue","Wed","Thu","Fri","Sat","Sun"]}
          series={[
            { name: "Correct", tone: "correct", points: [12,18,15,22,20,26,24] },
            { name: "Wrong", tone: "wrong", points: [4,3,6,2,3,2,1] },
          ]} />
      </div>
      <MxBottomNav value={nav} onChange={setNav} items={[
        { key: 'home', label: 'Home', icon: 'house' },
        { key: 'decks', label: 'Decks', icon: 'layers' },
        { key: 'stats', label: 'Stats', icon: 'bar-chart-3' },
        { key: 'more', label: 'More', icon: 'menu' },
      ]} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
</script>
</body>
</html>

<!-- @dsCard group="Sample Screens" viewport="430x900" name="New Learning — Recall" subtitle="recallMode (mode 4/5): hidden 20s countdown → reveal → self-grade; hidden / countdown / revealed / timeout / graded / loading-error, dark + light" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<link rel="stylesheet" href="phone.css" />
</head>
<body class="mx-desk">
<div id="root"></div>
<script type="text/babel">
const K = window.MxDesignKitMemoXV5_9f1387;
const { MxTopBar, MxIconButton, MxStudyProgressBar, MxStudyCard, MxRecallPanel, MxActionButton, MxCallout, MxErrorState } = K;
function Ic({ n, s = 20 }) { return <i data-lucide={n} style={{ width: s, height: s }}></i>; }

function Skel({ w, h, r }) {
  return <div style={{ width: w, height: h, borderRadius: r || 'var(--mx-radius-md)', background: 'var(--mx-color-state-loadingSurface)', flex: '0 0 auto' }} />;
}

const PROMPT = '기억하다';
const MEANING = 'To remember';

function StudyShell({ theme, step, percent, feedback, children, bottom }) {
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <div className="mx-phone" data-theme={theme === 'light' ? 'light' : undefined}>
      <div className="mx-status"><span>9:41</span><span style={{ display: 'flex', gap: 6 }}><i data-lucide="signal" style={{ width: 15, height: 15 }}></i><i data-lucide="wifi" style={{ width: 15, height: 15 }}></i><i data-lucide="battery-full" style={{ width: 15, height: 15 }}></i></span></div>
      <MxTopBar variant="study" leading={<MxIconButton icon={<Ic n="x" />} label="Exit recall" />} title="Recall"
        actions={<MxIconButton icon={<Ic n="volume-2" s={18} />} label="Play audio" variant="ghost" />} />
      {typeof percent === 'number' && (
        <div style={{ padding: '0 20px' }}><MxStudyProgressBar percent={percent} modeLabel="Recall" stepLabel={step} /></div>
      )}
      <div className="mx-scroll" style={{ padding: '20px', display: 'flex', flexDirection: 'column', gap: 18 }}>
        {children}
        {feedback}
      </div>
      {bottom !== null && <div className="mx-bottom">{bottom}</div>}
    </div>
  );
}
function Prompt() {
  return <MxStudyCard variant="prompt" prompt={PROMPT} note="Say the meaning in your head, then reveal" onAudio={() => {}} />;
}
const nextWord = <MxActionButton variant="primary" fullWidth trailingIcon={<Ic n="arrow-right" s={18} />}>Next word</MxActionButton>;

/* ---- MX-09.1 Hidden recall prompt ---- */
function HiddenPhone({ theme }) {
  return (
    <StudyShell theme={theme} step="7 / 12" percent={58} bottom={null}>
      <Prompt />
      <MxRecallPanel phase="hidden" seconds={20} onReveal={() => {}} />
    </StudyShell>
  );
}

/* ---- MX-09.2 Countdown (near timeout) ---- */
function CountdownPhone({ theme }) {
  return (
    <StudyShell theme={theme} step="7 / 12" percent={58} bottom={null}
      feedback={<div style={{ display: 'flex', justifyContent: 'center' }}><MxCallout tone="warning" icon={<Ic n="timer" s={16} />}>Reveal before the timer runs out, or it counts as forgotten.</MxCallout></div>}>
      <Prompt />
      <MxRecallPanel phase="hidden" seconds={5} onReveal={() => {}} />
    </StudyShell>
  );
}

/* ---- MX-09.3 Revealed (self-grade) ---- */
function RevealedPhone({ theme }) {
  return (
    <StudyShell theme={theme} step="7 / 12" percent={58} bottom={null}>
      <Prompt />
      <MxRecallPanel phase="revealed" meaning={MEANING} onForgot={() => {}} onRemembered={() => {}} />
    </StudyShell>
  );
}

/* ---- MX-09.4 Timeout / forgotten ---- */
function TimeoutPhone({ theme }) {
  return (
    <StudyShell theme={theme} step="7 / 12" percent={58} bottom={nextWord}
      feedback={<MxCallout tone="warning" icon={<Ic n="timer-off" s={16} />} title="Time’s up">No reveal in time, so this word is marked as forgotten. You’ll see it again soon.</MxCallout>}>
      <Prompt />
      <MxRecallPanel phase="revealed" seconds={0} meaning={MEANING} onForgot={() => {}} onRemembered={() => {}} />
    </StudyShell>
  );
}

/* ---- MX-09.5a Remembered ---- */
function RememberedPhone({ theme }) {
  return (
    <StudyShell theme={theme} step="7 / 12" percent={58} bottom={nextWord}
      feedback={<MxCallout tone="noDue" icon={<Ic n="check" s={16} />} title="Marked as remembered">Nice recall — “기억하다” = “To remember”.</MxCallout>}>
      <Prompt />
      <MxRecallPanel phase="revealed" meaning={MEANING} onForgot={() => {}} onRemembered={() => {}} />
    </StudyShell>
  );
}

/* ---- MX-09.5b Forgot ---- */
function ForgotPhone({ theme }) {
  return (
    <StudyShell theme={theme} step="7 / 12" percent={58} bottom={nextWord}
      feedback={<MxCallout tone="info" icon={<Ic n="rotate-ccw" s={16} />} title="Marked as forgotten">That’s fine — “기억하다” = “To remember”. It’ll come back later this round.</MxCallout>}>
      <Prompt />
      <MxRecallPanel phase="revealed" meaning={MEANING} onForgot={() => {}} onRemembered={() => {}} />
    </StudyShell>
  );
}

/* ---- MX-09.6 Loading ---- */
function LoadingPhone({ theme }) {
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <StudyShell theme={theme} percent={undefined} bottom={<Skel w="100%" h={52} r="var(--mx-radius-lg)" />}>
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12, padding: '16px 0 8px' }}>
        <Skel w={160} h={44} r="var(--mx-radius-md)" />
        <Skel w={180} h={14} r="var(--mx-radius-sm)" />
      </div>
      <Skel w="100%" h={120} r="var(--mx-radius-lg)" />
      <div style={{ textAlign: 'center', font: '500 var(--mx-text-body-small-size) var(--mx-font-display)', color: 'var(--mx-color-text-tertiary)' }}>Preparing recall…</div>
    </StudyShell>
  );
}

/* ---- MX-09.6 Error ---- */
function ErrorPhone({ theme }) {
  return (
    <StudyShell theme={theme} percent={undefined} bottom={null}>
      <div style={{ minHeight: '60vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <MxErrorState icon={<Ic n="cloud-off" s={40} />} title="Couldn't start recall"
          message="Your words and progress are safe on this device. Check your connection and try again."
          action={<MxActionButton variant="secondary" leadingIcon={<Ic n="rotate-cw" s={18} />}>Retry</MxActionButton>} />
      </div>
    </StudyShell>
  );
}

function DeskCaption({ children }) {
  return <div style={{ flexBasis: '100%', maxWidth: '100%', textAlign: 'center', margin: '10px 0 -8px', font: '700 var(--mx-text-body-small-size) var(--mx-font-display)', letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--mx-color-text-tertiary)' }}>{children}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <>
    <DeskCaption>MX-09.1 · Hidden recall prompt</DeskCaption>
    <HiddenPhone theme="dark" /><HiddenPhone theme="light" />
    <DeskCaption>MX-09.2 · Countdown (near timeout)</DeskCaption>
    <CountdownPhone theme="dark" /><CountdownPhone theme="light" />
    <DeskCaption>MX-09.3 · Revealed (self-grade)</DeskCaption>
    <RevealedPhone theme="dark" /><RevealedPhone theme="light" />
    <DeskCaption>MX-09.4 · Timeout → forgotten</DeskCaption>
    <TimeoutPhone theme="dark" /><TimeoutPhone theme="light" />
    <DeskCaption>MX-09.5 · Remembered</DeskCaption>
    <RememberedPhone theme="dark" /><RememberedPhone theme="light" />
    <DeskCaption>MX-09.5 · Forgot</DeskCaption>
    <ForgotPhone theme="dark" /><ForgotPhone theme="light" />
    <DeskCaption>MX-09.6 · Loading</DeskCaption>
    <LoadingPhone theme="dark" /><LoadingPhone theme="light" />
    <DeskCaption>MX-09.6 · Error</DeskCaption>
    <ErrorPhone theme="dark" /><ErrorPhone theme="light" />
  </>
);
setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
</script>
</body>
</html>

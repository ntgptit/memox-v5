<!-- @dsCard group="Sample Screens" viewport="840x880" name="Appearance & Reminders" subtitle="MxNestedSettingsScreenTemplate on S23 Ultra — theme presets + reminder, dark + light" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<link rel="stylesheet" href="phone.css" />
</head>
<body class="mx-desk">
<div id="root"></div>
<script type="text/babel">
const K = window.MxDesignKitMemoXV5_9f1387;
const { MxTopBar, MxIconButton, MxSettingsSection, MxSettingsRow, MxSwitch, MxThemePresetTile, MxReminderRow, MxCallout } = K;
function Ic({ n, s = 20 }) { return <i data-lucide={n} style={{ width: s, height: s }}></i>; }

function Screen({ theme }) {
  const [auto, setAuto] = React.useState(true);
  const [day, setDay] = React.useState('light');
  return (
    <div className="mx-phone" data-theme={theme === 'light' ? 'light' : undefined}>
      <div className="mx-status"><span>9:41</span><span style={{display:'flex',gap:6}}><i data-lucide="wifi" style={{width:15,height:15}}></i><i data-lucide="battery-full" style={{width:15,height:15}}></i></span></div>
      <MxTopBar variant="settings" leading={<MxIconButton icon={<Ic n="chevron-left" />} label="Back" />} title="Theme" />
      <div className="mx-scroll" style={{ padding: '12px 16px', display: 'flex', flexDirection: 'column', gap: 16 }}>
        <MxSettingsSection title="Mode">
          <MxSettingsRow leading={<Ic n="moon" />} title="Auto dark mode" subtitle="Follow system" control={<MxSwitch checked={auto} onChange={setAuto} label="Auto dark mode" />} />
        </MxSettingsSection>
        <div>
          <p style={{ font: '600 10px/1 var(--mx-font-display)', letterSpacing: '.06em', textTransform: 'uppercase', color: 'var(--mx-color-text-tertiary)', margin: '0 0 8px 4px' }}>Day theme</p>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
            <MxThemePresetTile name="Day" selected={day==='light'} onClick={()=>setDay('light')} preview={{ bg: '#eef1f6', surface: '#ffffff', accent: '#4863e6' }} />
            <MxThemePresetTile name="Ivory" selected={day==='sepia'} onClick={()=>setDay('sepia')} preview={{ bg: '#f4efe6', surface: '#fffdf8', accent: '#4863e6' }} />
          </div>
        </div>
        <div>
          <p style={{ font: '600 10px/1 var(--mx-font-display)', letterSpacing: '.06em', textTransform: 'uppercase', color: 'var(--mx-color-text-tertiary)', margin: '0 0 8px 4px' }}>Study reminders</p>
          <MxReminderRow time="13:00" enabled
            weekdays={['Mo','Tu','We','Th','Fr','Sa','Su'].map((l,i)=>({key:l,label:l,selected:i<5}))}
            onToggleWeekday={()=>{}} onDelete={()=>{}} />
        </div>
        <MxCallout tone="info">Changing the theme is a display preference only — it never affects your learning data or SRS progress.</MxCallout>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<><Screen theme="dark" /><Screen theme="light" /></>);
setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
</script>
</body>
</html>

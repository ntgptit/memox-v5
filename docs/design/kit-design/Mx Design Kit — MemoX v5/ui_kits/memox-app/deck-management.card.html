<!-- @dsCard group="Sample Screens" viewport="430x900" name="Deck Management" subtitle="List archetype (composition-reworked): tight header, single primary CTA, name→due-first row hierarchy; states + edge fixtures. See deck-management.contract.md" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<link rel="stylesheet" href="phone.css" />
</head>
<body class="mx-desk">
<div id="root"></div>
<script type="text/babel">
const K = window.MxDesignKitMemoXV5_9f1387;
const { MxTopBar, MxIconButton, MxCard, MxBadge, MxActionButton, MxEmptyState, MxErrorState, MxConfirmDialog } = K;
function Ic({ n, s = 20 }) { return <i data-lucide={n} style={{ width: s, height: s }}></i>; }
function fmt(n) { return n.toLocaleString('en-US'); }

/* ---- i18n (§7 VN / EN) ---- */
const EN = { search: 'Search decks', dir: 'KO → EN', sort: 'A → Z', newDeck: 'New subdeck', addCard: 'Add card',
  words: n => `${fmt(n)} words`, subdecks: (n, w) => `${n} subdecks · ${fmt(w)} words`, results: (n, q) => `${n} results for “${q}”` };
const VI = { search: 'Tìm bộ thẻ', dir: 'KO → VI', sort: 'A → Z', newDeck: 'Bộ thẻ mới', addCard: 'Thêm thẻ',
  words: n => `${fmt(n)} từ`, subdecks: (n, w) => `${n} bộ thẻ · ${fmt(w)} từ`, results: (n, q) => `${n} kết quả cho “${q}”` };

/* ---- §7 large-font: override px text tokens ×f ---- */
const TEXT_ROLES = { 'display-large': 40, 'title-large': 26, 'title-medium': 20, 'body-large': 17, 'body-medium': 15, 'body-small': 13, 'label-large': 15, 'label-medium': 13, 'caption': 12, 'study-korean': 34, 'study-explanation': 18, 'stat-number': 30, 'button': 16 };
function scaleTokens(f) { const o = {}; for (const k in TEXT_ROLES) o[`--mx-text-${k}-size`] = `${Math.round(TEXT_ROLES[k] * f * 10) / 10}px`; return o; }

/* ---- progress ring: lower visual weight than the play button (thin track, muted, non-interactive), shows % + a11y label ---- */
function Ring({ p, size = 48 }) {
  const sw = 3, r = (size - sw) / 2, c = 2 * Math.PI * r;
  const done = p > 0;
  const color = done ? 'var(--mx-color-srs-active)' : 'var(--mx-color-srs-preSrs)';
  return (
    <div role="img" aria-label={`${p}% mastered`} style={{ position: 'relative', width: size, height: size, flex: '0 0 auto' }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--mx-color-border-subtle)" strokeWidth={sw} />
        {done && <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c * (1 - p / 100)} />}
      </svg>
      <span style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', font: `600 11px var(--mx-font-mono)`, color: done ? 'var(--mx-color-text-secondary)' : 'var(--mx-color-text-tertiary)' }}>{p}%</span>
    </div>
  );
}

/* ---- standardized status badge: Due=warning · New=neutral · Completed=success · Empty=neutral (24px, icon 14) ---- */
function DueBadge({ d }) {
  if (d.newc > 0 && d.progress === 0) return <MxBadge tone="preSrs" size="small" icon={<Ic n="sparkles" s={14} />}>{fmt(d.newc)} new</MxBadge>;
  if (d.due > 0) return <MxBadge tone="due" size="small" icon={<Ic n="alarm-clock" s={14} />}>{fmt(d.due)} due</MxBadge>;
  if (d.words === 0) return <MxBadge tone="neutral" size="small">Empty</MxBadge>;
  return <MxBadge tone="noDue" size="small" icon={<Ic n="check" s={14} />}>Up to date</MxBadge>;
}

/* ---- deck row: name-first hierarchy, single-line metadata, ring left (info) / play right (action) ---- */
function DeckRow({ d, pressed, t = EN }) {
  const noStudy = d.disabled || d.words === 0;
  return (
    <MxCard variant="interactive" state={noStudy ? 'disabled' : 'none'} padding="16"
      onClick={noStudy ? undefined : () => {}}
      style={{ display: 'flex', alignItems: 'center', gap: 16, minHeight: 104, background: pressed ? 'var(--mx-color-state-pressedSurface)' : undefined }}>
      <Ring p={d.progress} />
      <div style={{ flex: '1 1 auto', minWidth: 0 }}>
        {/* primary = deck name (semibold, up to 2 lines, never ellipsis-hidden to 1 line) */}
        <div style={{ font: '600 var(--mx-text-body-large-size)/1.25 var(--mx-font-display)', color: 'var(--mx-color-text-primary)', display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>{d.name}</div>
        {/* D-03: consistent metadata — words + status; wraps as a whole at narrow widths so the badge is never clipped */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 6, minWidth: 0, flexWrap: 'wrap', rowGap: 4 }}>
          <span style={{ font: '500 var(--mx-text-body-small-size) var(--mx-font-display)', color: 'var(--mx-color-text-secondary)', flex: '0 0 auto' }}>{t.words(d.words)}</span>
          <DueBadge d={d} />
        </div>
      </div>
      <MxIconButton icon={<Ic n="play" s={18} />} label={`Start studying ${d.name}`} variant="surface" disabled={noStudy} />
    </MxCard>
  );
}

/* ---- filter chip: one control system for both filters (40px capsule) ---- */
function Chip({ selected, icon, trailing, children, label }) {
  return (
    <div role="button" tabIndex={0} aria-label={label} style={{
      display: 'inline-flex', alignItems: 'center', gap: 8, height: 40, padding: '0 14px', borderRadius: 999, cursor: 'pointer', whiteSpace: 'nowrap',
      background: selected ? 'var(--mx-color-state-selectedSurface)' : 'transparent',
      border: `1px solid ${selected ? 'transparent' : 'var(--mx-color-border-default)'}`,
      color: selected ? 'var(--mx-color-action-primary)' : 'var(--mx-color-text-secondary)',
      font: '600 var(--mx-text-body-small-size) var(--mx-font-display)',
    }}>{icon}{children}{trailing}</div>
  );
}

/* ---- search field: 48px, elevated surface (level 2), tight ---- */
function SearchField({ value, focused, t = EN }) {
  const has = value && value.length > 0;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12, height: 48, padding: '0 8px 0 12px', borderRadius: 'var(--mx-radius-md)', background: 'var(--mx-color-surface-elevated)', border: `1px solid ${focused ? 'var(--mx-color-state-selected)' : 'var(--mx-color-border-subtle)'}` }}>
      <i data-lucide="search" style={{ width: 18, height: 18, color: 'var(--mx-color-text-tertiary)', flex: '0 0 auto' }}></i>
      <span style={{ flex: '1 1 auto', font: '500 var(--mx-text-body-medium-size) var(--mx-font-display)', color: has ? 'var(--mx-color-text-primary)' : 'var(--mx-color-text-tertiary)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{has ? value : t.search}</span>
      {focused && <span style={{ width: 2, height: 20, background: 'var(--mx-color-action-primary)', flex: '0 0 auto' }} />}
      {has && !focused && <MxIconButton icon={<Ic n="x" s={16} />} label="Clear search" variant="ghost" size="small" />}
    </div>
  );
}

/* ---- header control area: app-bar → 12 → search(48) → 12 → filter(40) → 16 → list ---- */
function ControlArea({ query, focused, t = EN }) {
  return (
    <div style={{ padding: '12px 16px 0', display: 'flex', flexDirection: 'column', gap: 12 }}>
      <SearchField value={query} focused={focused} t={t} />
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        {/* direction is READ-ONLY per product spec (no picker in Phase 1) — chip styled for parity, no ▼ affordance */}
        <Chip selected icon={<Ic n="arrow-right" s={18} />} label={`Study direction ${t.dir}`}>{t.dir}</Chip>
        <Chip icon={<Ic n="arrow-up-down" s={18} />} label="Sort A to Z">{t.sort}</Chip>
      </div>
    </div>
  );
}

function Skel({ w, h, r }) {
  return <div style={{ width: w, height: h, borderRadius: r || 'var(--mx-radius-md)', background: 'var(--mx-color-state-loadingSurface)', flex: '0 0 auto' }} />;
}
function Keyboard() {
  const rows = ['qwertyuiop', 'asdfghjkl', 'zxcvbnm'];
  return (
    <div aria-hidden="true" style={{ padding: '8px 4px calc(8px + env(safe-area-inset-bottom, 0px))', background: 'var(--mx-color-surface-base)', borderTop: '1px solid var(--mx-color-border-subtle)', display: 'flex', flexDirection: 'column', gap: 8 }}>
      {rows.map((r, i) => (
        <div key={i} style={{ display: 'flex', gap: 4, justifyContent: 'center' }}>
          {r.split('').map((c, j) => <span key={j} style={{ flex: '1 1 0', maxWidth: 32, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: 'var(--mx-radius-sm)', background: 'var(--mx-color-surface-card)', border: '1px solid var(--mx-color-border-subtle)', font: '600 15px var(--mx-font-display)', color: 'var(--mx-color-text-secondary)' }}>{c}</span>)}
        </div>
      ))}
    </div>
  );
}

/* ---- data + fixtures ---- */
const decks = [
  { name: 'Basic greetings', words: 38, progress: 66, due: 14, newc: 0 },
  { name: 'Everyday verbs', words: 52, progress: 48, due: 7, newc: 0 },
  { name: 'Irregular verbs', words: 45, progress: 34, due: 15, newc: 0 },
  { name: 'Food & dining', words: 54, progress: 100, due: 0, newc: 0 },
  { name: 'Numbers & counting', words: 28, progress: 0, due: 0, newc: 28 },
];
const denseDecks = decks.concat([
  { name: 'Weather & seasons', words: 31, progress: 20, due: 9, newc: 0 },
  { name: 'Family & relatives', words: 26, progress: 55, due: 3, newc: 0 },
  { name: 'Hobbies & leisure', words: 40, progress: 12, due: 0, newc: 12 },
  { name: 'Work & office', words: 63, progress: 78, due: 127, newc: 0 },
  { name: 'Health & body', words: 48, progress: 5, due: 0, newc: 48 },
  { name: 'Shopping & money', words: 37, progress: 90, due: 0, newc: 0 },
  { name: 'Transport & travel', words: 44, progress: 41, due: 11, newc: 0 },
]);
const minDecks = [{ name: 'Basic greetings', words: 38, progress: 66, due: 0, newc: 0 }];
const longDeck = { name: 'Advanced business Korean — honorifics, formal verb endings, and workplace email etiquette', words: 9999, progress: 47, due: 1234, newc: 0 };
const viDecks = [
  { name: 'Chào hỏi cơ bản', words: 38, progress: 66, due: 14, newc: 0 },
  { name: 'Động từ thường ngày', words: 52, progress: 48, due: 7, newc: 0 },
  { name: 'Động từ bất quy tắc', words: 45, progress: 34, due: 15, newc: 0 },
  { name: 'Ăn uống & nhà hàng', words: 54, progress: 100, due: 0, newc: 0 },
  { name: 'Số đếm & đơn vị', words: 28, progress: 0, due: 0, newc: 28 },
];
const totalWords = decks.reduce((a, d) => a + d.words, 0);

/* ---- shared phone shell: New subdeck moved to app bar; single primary CTA at bottom ---- */
function Shell({ theme, subtitle, children, overlay, busy, t = EN, frameStyle, noBottom, keyboard }) {
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <div className="mx-phone" data-theme={theme === 'light' ? 'light' : undefined} aria-busy={busy ? 'true' : undefined} style={frameStyle}>
      <div className="mx-status"><span>9:41</span><span style={{ display: 'flex', gap: 8 }}><i data-lucide="signal" style={{ width: 15, height: 15 }}></i><i data-lucide="wifi" style={{ width: 15, height: 15 }}></i><i data-lucide="battery-full" style={{ width: 15, height: 15 }}></i></span></div>
      <MxTopBar
        leading={<MxIconButton icon={<Ic n="chevron-left" />} label="Back" />}
        title="Korean TOPIK I" subtitle={subtitle}
        actions={<span style={{ display: 'flex', gap: 4 }}>
          <MxIconButton icon={<Ic n="folder-plus" s={20} />} label={t.newDeck} variant="ghost" />
          <MxIconButton icon={<Ic n="ellipsis-vertical" s={20} />} label="More options" variant="ghost" />
        </span>} />
      <div className="mx-scroll">{children}</div>
      {!noBottom && <div className="mx-bottom"><MxActionButton variant="primary" fullWidth leadingIcon={<Ic n="plus" s={18} />}>{t.addCard}</MxActionButton></div>}
      {keyboard && <Keyboard />}
      {overlay}
    </div>
  );
}
function Centered({ children }) {
  return <div style={{ minHeight: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '0 16px' }}>{children}</div>;
}
function DeckList({ items, t = EN }) {
  return <div style={{ padding: '16px 16px 16px', display: 'flex', flexDirection: 'column', gap: 12 }}>{items.map((d, i) => <DeckRow key={i} d={d} t={t} />)}</div>;
}

/* ==== STATE MATRIX (§6) ==== */
function LoadedPhone({ theme, t = EN, frameStyle, decksData = decks }) {
  return (
    <Shell theme={theme} subtitle={t.subdecks(decksData.length, decksData.reduce((a, d) => a + d.words, 0))} t={t} frameStyle={frameStyle}>
      <ControlArea query="" t={t} />
      <DeckList items={decksData} t={t} />
    </Shell>
  );
}
function LoadingPhone({ theme }) {
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <Shell theme={theme} subtitle="Loading…" busy>
      <div style={{ padding: '12px 16px 0', display: 'flex', flexDirection: 'column', gap: 12 }}>
        <Skel w="100%" h={48} r="var(--mx-radius-md)" />
        <div style={{ display: 'flex', justifyContent: 'space-between' }}><Skel w={104} h={40} r="999px" /><Skel w={80} h={40} r="999px" /></div>
      </div>
      <div style={{ padding: '16px 16px 16px', display: 'flex', flexDirection: 'column', gap: 12 }}>
        {[0, 1, 2, 3].map(i => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 16, minHeight: 104, padding: 16, border: '1px solid var(--mx-color-border-subtle)', borderRadius: 'var(--mx-radius-lg)' }}>
            <Skel w={48} h={48} r="999px" />
            <div style={{ flex: '1 1 auto', display: 'flex', flexDirection: 'column', gap: 8 }}><Skel w="70%" h={16} r="var(--mx-radius-sm)" /><Skel w="42%" h={12} r="var(--mx-radius-sm)" /></div>
            <Skel w={44} h={44} r="999px" />
          </div>
        ))}
      </div>
    </Shell>
  );
}
function EmptyPhone({ theme }) {
  return (
    <Shell theme={theme} subtitle="No subdecks">
      <Centered>
        <MxEmptyState icon={<Ic n="folder-plus" s={40} />} title="No subdecks yet"
          message="Group this deck into subdecks, or add cards directly to start learning."
          action={<MxActionButton leadingIcon={<Ic n="plus" s={18} />}>Add first card</MxActionButton>} />
      </Centered>
    </Shell>
  );
}
function SearchActivePhone({ theme }) {
  const q = 'verbs';
  const results = decks.filter(d => d.name.toLowerCase().includes(q));
  return (
    <Shell theme={theme} subtitle={`${results.length} of ${decks.length} subdecks`}>
      <ControlArea query={q} />
      <div style={{ padding: '12px 16px 0', font: '600 var(--mx-text-body-small-size) var(--mx-font-display)', color: 'var(--mx-color-text-tertiary)' }}>{EN.results(results.length, q)}</div>
      <DeckList items={results} />
    </Shell>
  );
}
function SearchEmptyPhone({ theme }) {
  const q = 'kanji';
  return (
    <Shell theme={theme} subtitle={`0 of ${decks.length} subdecks`}>
      <ControlArea query={q} />
      <Centered>
        <MxEmptyState icon={<Ic n="search-x" s={40} />} title="No decks match “kanji”"
          message="Try a different spelling, or clear the search to see all subdecks."
          action={<MxActionButton variant="secondary" leadingIcon={<Ic n="x" s={18} />}>Clear search</MxActionButton>} />
      </Centered>
    </Shell>
  );
}
function ErrorPhone({ theme }) {
  return (
    <Shell theme={theme}>
      <Centered>
        <MxErrorState icon={<Ic n="cloud-off" s={40} />} title="Couldn't load subdecks"
          message="Your decks and learning history are safe on this device. Check your connection and try again."
          action={<MxActionButton variant="secondary" leadingIcon={<Ic n="rotate-cw" s={18} />}>Retry</MxActionButton>} />
      </Centered>
    </Shell>
  );
}
function RowCaption({ children }) {
  return <div style={{ margin: '12px 4px 4px', font: '700 var(--mx-text-body-small-size) var(--mx-font-display)', letterSpacing: '0.04em', textTransform: 'uppercase', color: 'var(--mx-color-text-tertiary)' }}>{children}</div>;
}
function RowStatesPhone({ theme }) {
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <Shell theme={theme} subtitle="Deck row states">
      <div style={{ padding: '4px 16px 16px' }}>
        <RowCaption>Default · resting</RowCaption><DeckRow d={{ name: 'Basic greetings', words: 38, progress: 66, due: 0, newc: 0 }} />
        <RowCaption>Pressed · tap feedback</RowCaption><DeckRow d={{ name: 'Basic greetings', words: 38, progress: 66, due: 0, newc: 0 }} pressed />
        <RowCaption>Due · review workload</RowCaption><DeckRow d={{ name: 'Irregular verbs', words: 45, progress: 34, due: 15, newc: 0 }} />
        <RowCaption>No-due · up to date</RowCaption><DeckRow d={{ name: 'Food & dining', words: 54, progress: 100, due: 0, newc: 0 }} />
        <RowCaption>Disabled · nothing to study</RowCaption><DeckRow d={{ name: 'Travel & directions', words: 0, progress: 0, due: 0, newc: 0 }} />
      </div>
    </Shell>
  );
}
function DeleteConfirmPhone({ theme }) {
  return (
    <Shell theme={theme} subtitle={`${decks.length} subdecks · ${totalWords} words`}
      overlay={<MxConfirmDialog open variant="highRisk" title="Delete “Irregular verbs”?"
        message="This subdeck and its 45 words will be permanently removed from this device."
        warning="Your other decks and learning history stay safe — but this subdeck can’t be recovered."
        confirmLabel="Delete deck" cancelLabel="Keep deck" />}>
      <ControlArea query="" />
      <DeckList items={decks.slice(0, 3).map((d, i) => (i === 2 ? { ...d } : d))} />
    </Shell>
  );
}

/* ==== EDGE-DATA FIXTURES (§7) ==== */
function MinDataPhone({ theme }) { return <LoadedPhone theme={theme} decksData={minDecks} />; }
function DenseDataPhone({ theme }) { return <LoadedPhone theme={theme} decksData={denseDecks} />; }
function LongTextPhone({ theme }) {
  return (
    <Shell theme={theme} subtitle="1 subdeck · 9,999 words">
      <ControlArea query="" />
      <DeckList items={[longDeck, { name: 'Food & dining', words: 54, progress: 100, due: 0, newc: 0 }]} />
    </Shell>
  );
}
function VNPhone({ theme }) { return <LoadedPhone theme={theme} t={VI} decksData={viDecks} />; }
function FontScalePhone({ theme, scale }) { return <LoadedPhone theme={theme} frameStyle={scaleTokens(scale)} />; }
function WidthPhone({ theme, width }) { return <LoadedPhone theme={theme} frameStyle={{ width }} />; }
function KeyboardSearchPhone({ theme }) {
  const q = 'ver';
  const results = decks.filter(d => d.name.toLowerCase().includes(q));
  return (
    <Shell theme={theme} subtitle={`${results.length} of ${decks.length} subdecks`} noBottom keyboard>
      <ControlArea query={q} focused />
      <div style={{ padding: '12px 16px 0', font: '600 var(--mx-text-body-small-size) var(--mx-font-display)', color: 'var(--mx-color-text-tertiary)' }}>{EN.results(results.length, q)}</div>
      <DeckList items={results} />
    </Shell>
  );
}

function DeskCaption({ children }) {
  return <div style={{ flexBasis: '100%', maxWidth: '100%', textAlign: 'center', margin: '10px 0 -8px', font: '700 var(--mx-text-body-small-size) var(--mx-font-display)', letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--mx-color-text-tertiary)' }}>{children}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <>
    <DeskCaption>§6 · Loaded (normal)</DeskCaption><LoadedPhone theme="dark" /><LoadedPhone theme="light" />
    <DeskCaption>§6 · Loading</DeskCaption><LoadingPhone theme="dark" /><LoadingPhone theme="light" />
    <DeskCaption>§6 · Loaded — minimum data (1 item, 0 due)</DeskCaption><MinDataPhone theme="dark" /><MinDataPhone theme="light" />
    <DeskCaption>§6 · Loaded — dense data (12 items, 3-digit due)</DeskCaption><DenseDataPhone theme="dark" /><DenseDataPhone theme="light" />
    <DeskCaption>§6 · Empty</DeskCaption><EmptyPhone theme="dark" /><EmptyPhone theme="light" />
    <DeskCaption>§6 · Recoverable error</DeskCaption><ErrorPhone theme="dark" /><ErrorPhone theme="light" />
    <DeskCaption>§6 · Search active</DeskCaption><SearchActivePhone theme="dark" /><SearchActivePhone theme="light" />
    <DeskCaption>§6 · Search empty</DeskCaption><SearchEmptyPhone theme="dark" /><SearchEmptyPhone theme="light" />
    <DeskCaption>§6 · Row states</DeskCaption><RowStatesPhone theme="dark" /><RowStatesPhone theme="light" />
    <DeskCaption>§6 · Delete confirm (high-risk)</DeskCaption><DeleteConfirmPhone theme="dark" /><DeleteConfirmPhone theme="light" />
    <DeskCaption>§7 · Long text (2-line name, 9,999 words, 1,234 due)</DeskCaption><LongTextPhone theme="dark" /><LongTextPhone theme="light" />
    <DeskCaption>§7 · Vietnamese content (KO → VI)</DeskCaption><VNPhone theme="dark" /><VNPhone theme="light" />
    <DeskCaption>§7 · Large font — scale 1.3</DeskCaption><FontScalePhone theme="dark" scale={1.3} /><FontScalePhone theme="light" scale={1.3} />
    <DeskCaption>§7 · Large font — scale 1.5</DeskCaption><FontScalePhone theme="dark" scale={1.5} /><FontScalePhone theme="light" scale={1.5} />
    <DeskCaption>§7 · Narrow device — 320 / 360 / 390 / 430 px</DeskCaption>
    <WidthPhone theme="dark" width={320} /><WidthPhone theme="dark" width={360} /><WidthPhone theme="dark" width={390} /><WidthPhone theme="dark" width={430} />
    <DeskCaption>§7 · Keyboard open (search focused — single CTA yields, search stays visible)</DeskCaption><KeyboardSearchPhone theme="dark" /><KeyboardSearchPhone theme="light" />
  </>
);
setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
</script>
</body>
</html>

<!-- @dsCard group="Sample Screens" viewport="430x900" name="Deck Management" subtitle="Subdeck list within a parent deck — search, sort, direction, deck rows; loaded / loading / empty / search / error / row-states / delete confirm, dark + light" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<link rel="stylesheet" href="phone.css" />
</head>
<body class="mx-desk">
<div id="root"></div>
<script type="text/babel">
const K = window.MxDesignKitMemoXV5_9f1387;
const { MxTopBar, MxIconButton, MxCard, MxBadge, MxActionButton, MxListRow, MxSectionHeader, MxEmptyState, MxErrorState, MxConfirmDialog } = K;
function Ic({ n, s = 20 }) { return <i data-lucide={n} style={{ width: s, height: s }}></i>; }

/* ---- screen-specific helpers (non-Mx, token-only, not reused elsewhere) ---- */

function Ring({ p, size = 46 }) {
  const sw = 4, r = (size - sw) / 2, c = 2 * Math.PI * r;
  const color = p > 0 ? 'var(--mx-color-srs-active)' : 'var(--mx-color-srs-preSrs)';
  return (
    <div style={{ position: 'relative', width: size, height: size, flex: '0 0 auto' }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--mx-color-border-default)" strokeWidth={sw} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c * (1 - p / 100)} />
      </svg>
      <span style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', font: '700 12px var(--mx-font-mono)', color }}>{p}</span>
    </div>
  );
}

function DueBadge({ d }) {
  if (d.newc > 0 && d.progress === 0) return <MxBadge tone="preSrs" size="small" icon={<Ic n="sparkles" s={12} />}>{d.newc} new</MxBadge>;
  if (d.due > 0) return <MxBadge tone="due" size="small" icon={<Ic n="alarm-clock" s={12} />}>{d.due} due</MxBadge>;
  if (d.words === 0) return <MxBadge tone="neutral" size="small">Empty</MxBadge>;
  return <MxBadge tone="noDue" size="small" icon={<Ic n="check" s={12} />}>Up to date</MxBadge>;
}

function DeckRow({ d, pressed }) {
  const noStudy = d.disabled || d.words === 0;
  return (
    <MxCard
      variant="interactive"
      state={noStudy ? 'disabled' : 'none'}
      padding="12"
      onClick={noStudy ? undefined : () => {}}
      style={{ display: 'flex', alignItems: 'center', gap: 16, background: pressed ? 'var(--mx-color-state-pressedSurface)' : undefined }}
    >
      <Ring p={d.progress} />
      <div style={{ flex: '1 1 auto', minWidth: 0 }}>
        <div style={{ font: '700 var(--mx-text-body-large-size)/1.25 var(--mx-font-display)', color: 'var(--mx-color-text-primary)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{d.name}</div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 4, flexWrap: 'wrap' }}>
          <span style={{ fontSize: 'var(--mx-text-body-small-size)', color: 'var(--mx-color-text-tertiary)' }}>{d.words} words</span>
          <DueBadge d={d} />
        </div>
      </div>
      <MxIconButton icon={<Ic n="play" s={18} />} label={`Start studying ${d.name}`} variant="surface" disabled={noStudy} />
    </MxCard>
  );
}

function SearchField({ value }) {
  const has = value && value.length > 0;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12, minHeight: 44, padding: '0 8px 0 12px', borderRadius: 'var(--mx-radius-md)', background: 'var(--mx-color-surface-card)', border: '1px solid var(--mx-color-border-default)' }}>
      <i data-lucide="search" style={{ width: 18, height: 18, color: 'var(--mx-color-text-tertiary)', flex: '0 0 auto' }}></i>
      <span style={{ flex: '1 1 auto', font: '500 var(--mx-text-body-medium-size) var(--mx-font-display)', color: has ? 'var(--mx-color-text-primary)' : 'var(--mx-color-text-tertiary)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{has ? value : 'Search decks'}</span>
      {has && <MxIconButton icon={<Ic n="x" s={16} />} label="Clear search" variant="ghost" size="small" />}
    </div>
  );
}

function ControlArea({ query }) {
  return (
    <div style={{ padding: '8px 16px 4px', display: 'flex', flexDirection: 'column', gap: 12 }}>
      <SearchField value={query} />
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <MxBadge tone="active" icon={<i data-lucide="arrow-right" style={{ width: 13, height: 13 }}></i>}>KO → EN</MxBadge>
        <MxActionButton size="small" variant="ghost" leadingIcon={<Ic n="arrow-up-down" s={16} />}>A → Z</MxActionButton>
      </div>
    </div>
  );
}

function Skel({ w, h, r }) {
  return <div style={{ width: w, height: h, borderRadius: r || 'var(--mx-radius-md)', background: 'var(--mx-color-state-loadingSurface)', flex: '0 0 auto' }} />;
}

/* ---- data ---- */

const decks = [
  { name: 'Basic greetings', words: 38, progress: 66, due: 14, newc: 0 },
  { name: 'Everyday verbs', words: 52, progress: 48, due: 7, newc: 0 },
  { name: 'Irregular verbs', words: 45, progress: 34, due: 15, newc: 0 },
  { name: 'Food & dining', words: 54, progress: 100, due: 0, newc: 0 },
  { name: 'Numbers & counting', words: 28, progress: 0, due: 0, newc: 28 },
];
const totalWords = decks.reduce((a, d) => a + d.words, 0);

/* ---- shared phone shell ---- */

function Shell({ theme, subtitle, children, overlay, busy }) {
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <div className="mx-phone" data-theme={theme === 'light' ? 'light' : undefined} aria-busy={busy ? 'true' : undefined}>
      <div className="mx-status"><span>9:41</span><span style={{ display: 'flex', gap: 8 }}><i data-lucide="signal" style={{ width: 15, height: 15 }}></i><i data-lucide="wifi" style={{ width: 15, height: 15 }}></i><i data-lucide="battery-full" style={{ width: 15, height: 15 }}></i></span></div>
      <MxTopBar
        leading={<MxIconButton icon={<Ic n="chevron-left" />} label="Back" />}
        title="Korean TOPIK I"
        subtitle={subtitle}
      />
      <div className="mx-scroll">{children}</div>
      <div className="mx-bottom">
        <MxActionButton variant="secondary" leadingIcon={<Ic n="folder-plus" s={18} />}>New subdeck</MxActionButton>
        <MxActionButton variant="primary" fullWidth leadingIcon={<Ic n="plus" s={18} />}>Add card</MxActionButton>
      </div>
      {overlay}
    </div>
  );
}

function Centered({ children }) {
  return <div style={{ minHeight: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '0 16px' }}>{children}</div>;
}

/* ---- MX-02.1 Loaded deck list ---- */
function LoadedPhone({ theme }) {
  return (
    <Shell theme={theme} subtitle={`${decks.length} subdecks · ${totalWords} words`}>
      <ControlArea query="" />
      <div style={{ padding: '8px 16px 16px', display: 'flex', flexDirection: 'column', gap: 12 }}>
        {decks.map((d, i) => <DeckRow key={i} d={d} />)}
      </div>
    </Shell>
  );
}

/* ---- MX-02.2 Loading ---- */
function LoadingPhone({ theme }) {
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <Shell theme={theme} subtitle="Loading…" busy>
      <div style={{ padding: '8px 16px 4px', display: 'flex', flexDirection: 'column', gap: 12 }}>
        <Skel w="100%" h={44} r="var(--mx-radius-md)" />
        <div style={{ display: 'flex', justifyContent: 'space-between' }}><Skel w={96} h={26} r="999px" /><Skel w={72} h={26} r="999px" /></div>
      </div>
      <div style={{ padding: '8px 16px 16px', display: 'flex', flexDirection: 'column', gap: 12 }}>
        {[0, 1, 2, 3].map(i => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 16, padding: 12, border: '1px solid var(--mx-color-border-subtle)', borderRadius: 'var(--mx-radius-lg)' }}>
            <Skel w={46} h={46} r="999px" />
            <div style={{ flex: '1 1 auto', display: 'flex', flexDirection: 'column', gap: 8 }}>
              <Skel w="70%" h={15} r="var(--mx-radius-sm)" />
              <Skel w="42%" h={12} r="var(--mx-radius-sm)" />
            </div>
            <Skel w={44} h={44} r="var(--mx-radius-md)" />
          </div>
        ))}
      </div>
    </Shell>
  );
}

/* ---- MX-02.3 Empty no decks ---- */
function EmptyPhone({ theme }) {
  return (
    <Shell theme={theme} subtitle="No subdecks">
      <Centered>
        <MxEmptyState icon={<Ic n="folder-plus" s={40} />} title="No subdecks yet"
          message="Group this deck into subdecks, or add cards directly to start learning."
          action={<MxActionButton leadingIcon={<Ic n="plus" s={18} />}>Add first card</MxActionButton>} />
      </Centered>
    </Shell>
  );
}

/* ---- MX-02.4 Search active ---- */
function SearchActivePhone({ theme }) {
  const q = 'verbs';
  const results = decks.filter(d => d.name.toLowerCase().includes(q));
  return (
    <Shell theme={theme} subtitle={`${results.length} of ${decks.length} subdecks`}>
      <ControlArea query={q} />
      <div style={{ padding: '4px 16px 0', font: '600 var(--mx-text-body-small-size) var(--mx-font-display)', color: 'var(--mx-color-text-tertiary)' }}>
        {results.length} results for “{q}”
      </div>
      <div style={{ padding: '8px 16px 16px', display: 'flex', flexDirection: 'column', gap: 12 }}>
        {results.map((d, i) => <DeckRow key={i} d={d} />)}
      </div>
    </Shell>
  );
}

/* ---- MX-02.5 Search empty ---- */
function SearchEmptyPhone({ theme }) {
  const q = 'kanji';
  return (
    <Shell theme={theme} subtitle={`0 of ${decks.length} subdecks`}>
      <ControlArea query={q} />
      <Centered>
        <MxEmptyState icon={<Ic n="search-x" s={40} />} title="No decks match “kanji”"
          message="Try a different spelling, or clear the search to see all subdecks."
          action={<MxActionButton variant="secondary" leadingIcon={<Ic n="x" s={18} />}>Clear search</MxActionButton>} />
      </Centered>
    </Shell>
  );
}

/* ---- MX-02.6 Error ---- */
function ErrorPhone({ theme }) {
  return (
    <Shell theme={theme}>
      <Centered>
        <MxErrorState icon={<Ic n="cloud-off" s={40} />} title="Couldn't load subdecks"
          message="Your decks and learning history are safe on this device. Check your connection and try again."
          action={<MxActionButton variant="secondary" leadingIcon={<Ic n="rotate-cw" s={18} />}>Retry</MxActionButton>} />
      </Centered>
    </Shell>
  );
}

/* ---- MX-02.7 Row states ---- */
function RowCaption({ children }) {
  return <div style={{ margin: '14px 4px 2px', font: '700 var(--mx-text-body-small-size) var(--mx-font-display)', letterSpacing: '0.04em', textTransform: 'uppercase', color: 'var(--mx-color-text-tertiary)' }}>{children}</div>;
}
function RowStatesPhone({ theme }) {
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <Shell theme={theme} subtitle="Deck row states">
      <div style={{ padding: '4px 16px 16px' }}>
        <RowCaption>Default · resting</RowCaption>
        <DeckRow d={{ name: 'Basic greetings', words: 38, progress: 66, due: 0, newc: 0 }} />
        <RowCaption>Pressed · tap feedback</RowCaption>
        <DeckRow d={{ name: 'Basic greetings', words: 38, progress: 66, due: 0, newc: 0 }} pressed />
        <RowCaption>Due · review workload</RowCaption>
        <DeckRow d={{ name: 'Irregular verbs', words: 45, progress: 34, due: 15, newc: 0 }} />
        <RowCaption>No-due · up to date</RowCaption>
        <DeckRow d={{ name: 'Food & dining', words: 54, progress: 100, due: 0, newc: 0 }} />
        <RowCaption>Disabled · nothing to study</RowCaption>
        <DeckRow d={{ name: 'Travel & directions', words: 0, progress: 0, due: 0, newc: 0 }} />
      </div>
    </Shell>
  );
}

/* ---- MX-02.8 Delete confirm ---- */
function DeleteConfirmPhone({ theme }) {
  return (
    <Shell theme={theme} subtitle={`${decks.length} subdecks · ${totalWords} words`}
      overlay={
        <MxConfirmDialog
          open
          variant="highRisk"
          title="Delete “Irregular verbs”?"
          message="This subdeck and its 45 words will be permanently removed from this device."
          warning="Your other decks and learning history stay safe — but this subdeck can’t be recovered."
          confirmLabel="Delete deck"
          cancelLabel="Keep deck"
        />
      }>
      <ControlArea query="" />
      <div style={{ padding: '8px 16px 16px', display: 'flex', flexDirection: 'column', gap: 12 }}>
        {decks.slice(0, 3).map((d, i) => <DeckRow key={i} d={d} pressed={d.name === 'Irregular verbs'} />)}
      </div>
    </Shell>
  );
}

/* ---- desk grouping caption ---- */
function DeskCaption({ children }) {
  return <div style={{ flexBasis: '100%', maxWidth: '100%', textAlign: 'center', margin: '10px 0 -8px', font: '700 var(--mx-text-body-small-size) var(--mx-font-display)', letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--mx-color-text-tertiary)' }}>{children}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <>
    <DeskCaption>MX-02.1 · Loaded deck list</DeskCaption>
    <LoadedPhone theme="dark" /><LoadedPhone theme="light" />
    <DeskCaption>MX-02.2 · Loading</DeskCaption>
    <LoadingPhone theme="dark" /><LoadingPhone theme="light" />
    <DeskCaption>MX-02.3 · Empty — no subdecks</DeskCaption>
    <EmptyPhone theme="dark" /><EmptyPhone theme="light" />
    <DeskCaption>MX-02.4 · Search active</DeskCaption>
    <SearchActivePhone theme="dark" /><SearchActivePhone theme="light" />
    <DeskCaption>MX-02.5 · Search empty</DeskCaption>
    <SearchEmptyPhone theme="dark" /><SearchEmptyPhone theme="light" />
    <DeskCaption>MX-02.6 · Load error</DeskCaption>
    <ErrorPhone theme="dark" /><ErrorPhone theme="light" />
    <DeskCaption>MX-02.7 · Deck row states</DeskCaption>
    <RowStatesPhone theme="dark" /><RowStatesPhone theme="light" />
    <DeskCaption>MX-02.8 · Delete confirm (high-risk)</DeskCaption>
    <DeleteConfirmPhone theme="dark" /><DeleteConfirmPhone theme="light" />
  </>
);
setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
</script>
</body>
</html>

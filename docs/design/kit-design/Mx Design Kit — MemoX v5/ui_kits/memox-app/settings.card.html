<!-- @dsCard group="Sample Screens" viewport="430x900" name="Settings / More Hub" subtitle="Bazar-language settings — grouped rows, switch, destructive, bottom nav (light-first)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<link rel="stylesheet" href="phone.css" />
</head>
<body class="mx-desk">
<div id="root"></div>
<script type="text/babel">
const K = window.MxDesignKitMemoXV5_9f1387;
const { MxTopBar, MxIconButton, MxSettingsSection, MxSettingsRow, MxSwitch, MxSectionHeader, MxBottomNav } = K;
function Ic({ n, s = 20 }) { return <i data-lucide={n} style={{ width: s, height: s }}></i>; }

function App() {
  const [notif, setNotif] = React.useState(true);
  const [autoBackup, setAutoBackup] = React.useState(true);
  const [nav, setNav] = React.useState('more');
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <div className="mx-phone" data-theme="light">
      <div className="mx-status"><span>9:41</span><span style={{display:'flex',gap:6}}><i data-lucide="wifi" style={{width:15,height:15}}></i><i data-lucide="battery-full" style={{width:15,height:15}}></i></span></div>
      <MxTopBar variant="settings" title="Settings" actions={<MxIconButton icon={<Ic n="circle-user-round" s={22} />} label="Account" />} />
      <div className="mx-scroll" style={{ padding: '4px 16px 12px' }}>
        <MxSectionHeader size="hero" eyebrow="Preferences" title="More" style={{ margin: '4px 4px 18px' }} />
        <MxSettingsSection title="Learning">
          <MxSettingsRow leading={<Ic n="globe" />} title="Native language" value="English" onClick={()=>{}} />
          <MxSettingsRow leading={<Ic n="layers" />} title="Spaced repetition" value="8 boxes" onClick={()=>{}} />
          <MxSettingsRow leading={<Ic n="bell" />} title="SRS notifications" control={<MxSwitch checked={notif} onChange={setNotif} label="Notifications" />} />
        </MxSettingsSection>
        <MxSettingsSection title="Reminders & appearance">
          <MxSettingsRow leading={<Ic n="clock" />} title="Reminders" value="13:00 · Mon–Fri" onClick={()=>{}} />
          <MxSettingsRow leading={<Ic n="palette" />} title="Theme" value="System" onClick={()=>{}} />
        </MxSettingsSection>
        <MxSettingsSection title="Data" description="High-risk actions require confirmation.">
          <MxSettingsRow leading={<Ic n="save" />} title="Auto backup" subtitle="Last: 1 minute ago" control={<MxSwitch checked={autoBackup} onChange={setAutoBackup} label="Auto backup" />} />
          <MxSettingsRow leading={<Ic n="cloud" />} title="Cloud sync" unavailable />
          <MxSettingsRow leading={<Ic n="rotate-ccw" />} title="Restore data" subtitle="Overwrites current data" tone="destructive" onClick={()=>{}} />
        </MxSettingsSection>
      </div>
      <MxBottomNav value={nav} onChange={setNav} items={[
        { key: 'home', label: 'Home', icon: 'house' },
        { key: 'decks', label: 'Decks', icon: 'layers' },
        { key: 'stats', label: 'Stats', icon: 'bar-chart-3' },
        { key: 'more', label: 'More', icon: 'menu' },
      ]} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
</script>
</body>
</html>

<!-- @dsCard group="Components" viewport="700x1200" name="Mx Learning Components" subtitle="Study card, 5-mode primitives, progress, session result — dark + light" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 20px; background: #05070b; }
  @keyframes mx-spin { to { transform: rotate(360deg); } }
  .mx-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .mx-pane { border-radius: 20px; padding: 20px; background: var(--mx-color-background-app); border: 1px solid rgba(255,255,255,0.05); }
  .mx-h { font: 600 11px/1 var(--mx-font-display); letter-spacing: .12em; text-transform: uppercase; color: var(--mx-color-text-tertiary); margin: 22px 0 12px; }
  .mx-h:first-child { margin-top: 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const K = window.MxDesignKitMemoXV5_9f1387;
const { MxStudyProgressBar, MxStudyCard, MxAnswerOption, MxMatchTile, MxRecallPanel, MxFillInputPanel, MxSessionResultSummary } = K;

function Pane({ theme }) {
  return (
    <div className="mx-pane" data-theme={theme === 'light' ? 'light' : undefined}>
      <p className="mx-h">Progress + study card (reviewMode)</p>
      <MxStudyProgressBar percent={40} modeLabel="Guess" stepLabel="4 / 10" />
      <div style={{ height: 12 }} />
      <MxStudyCard variant="both" prompt="결제하다" meaning="To pay / Pay for goods or services" onAudio={() => {}} />

      <p className="mx-h">Guess options</p>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        <MxAnswerOption state="correct">To pay</MxAnswerOption>
        <MxAnswerOption state="wrong">Reporter</MxAnswerOption>
        <MxAnswerOption state="default">Busy life</MxAnswerOption>
      </div>

      <p className="mx-h">Match tiles</p>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
        <MxMatchTile side="prompt" state="selected">기자</MxMatchTile>
        <MxMatchTile side="meaning" state="correct">Reporter</MxMatchTile>
        <MxMatchTile side="prompt" state="wrong">바쁜 생활</MxMatchTile>
        <MxMatchTile side="meaning" state="completed">To pay</MxMatchTile>
      </div>

      <p className="mx-h">Recall (revealed) + Fill (wrong→retry)</p>
      <MxRecallPanel phase="revealed" meaning="Busy life" onForgot={()=>{}} onRemembered={()=>{}} />
      <div style={{ height: 12 }} />
      <MxFillInputPanel value="결재하다" state="wrong" expected="결제하다" onRetry={()=>{}} />

      <p className="mx-h">Session result</p>
      <MxSessionResultSummary type="newLearning" headline="12 words learned"
        subhead="8 cards activated into Box 1"
        stats={[
          { label: 'Activated to Box 1', value: 8, tone: 'active' },
          { label: 'Not completed', value: 4 },
          { label: 'Correct', value: 46, tone: 'correct' },
          { label: 'Wrong', value: 9, tone: 'wrong' },
        ]} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <div className="mx-grid"><Pane theme="dark" /><Pane theme="light" /></div>
);
setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>

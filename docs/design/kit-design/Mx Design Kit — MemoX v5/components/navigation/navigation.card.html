<!-- @dsCard group="Components" viewport="700x560" name="Mx Navigation & Layout" subtitle="Section headers, underline tabs, bottom nav, avatars — Bazar design language, dark + light" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 20px; background: #05050e; }
  .mx-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .mx-pane { border-radius: 20px; padding: 20px; background: var(--mx-color-background-app); border: 1px solid rgba(128,128,128,0.12); overflow: hidden; }
  .mx-h { font: 600 11px/1 var(--mx-font-display); letter-spacing: .12em; text-transform: uppercase; color: var(--mx-color-text-tertiary); margin: 22px 0 12px; }
  .mx-h:first-child { margin-top: 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const K = window.MxDesignKitMemoXV5_9f1387;
const { MxSectionHeader, MxTabs, MxBottomNav, MxAvatar } = K;

function Pane({ theme }) {
  const [tab, setTab] = React.useState('All');
  const [nav, setNav] = React.useState('decks');
  return (
    <div className="mx-pane" data-theme={theme === 'light' ? 'light' : undefined}>
      <p className="mx-h">Screen intro (hero) + section header</p>
      <MxSectionHeader size="hero" eyebrow="Keep going" title="Your decks" />
      <div style={{ height: 16 }} />
      <MxSectionHeader title="Continue studying" actionLabel="See all" onAction={()=>{}} />

      <p className="mx-h">Underline tabs</p>
      <MxTabs options={["All", "Due", "New", "Mastered"]} value={tab} onChange={setTab} />

      <p className="mx-h">Avatars</p>
      <div style={{ display: 'flex', gap: 14, alignItems: 'center' }}>
        <MxAvatar name="John Freeman" size={52} />
        <MxAvatar name="Tess Gunty" size={44} />
        <MxAvatar name="Adam Dalva" size={36} />
      </div>

      <p className="mx-h">Bottom nav</p>
      <div style={{ borderRadius: 16, overflow: 'hidden', border: 'var(--mx-border-subtle)' }}>
        <MxBottomNav value={nav} onChange={setNav} items={[
          { key: 'decks', label: 'Decks', icon: 'layers' },
          { key: 'study', label: 'Study', icon: 'graduation-cap' },
          { key: 'stats', label: 'Stats', icon: 'bar-chart-3' },
          { key: 'more', label: 'More', icon: 'menu' },
        ]} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<div className="mx-grid"><Pane theme="light" /><Pane theme="dark" /></div>);
setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>

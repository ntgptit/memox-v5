<!-- @dsCard group="Components" viewport="700x620" name="Mx Feedback & Dialogs" subtitle="Callouts, snackbars, confirm dialogs (normal / destructive / high-risk) — dark + light" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 20px; background: #05070b; }
  .mx-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .mx-pane { border-radius: 20px; padding: 20px; background: var(--mx-color-background-app); border: 1px solid rgba(255,255,255,0.05); }
  .mx-h { font: 600 11px/1 var(--mx-font-display); letter-spacing: .12em; text-transform: uppercase; color: var(--mx-color-text-tertiary); margin: 20px 0 10px; }
  .mx-h:first-child { margin-top: 0; }
  .stack { display: flex; flex-direction: column; gap: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const K = window.MxDesignKitMemoXV5_9f1387;
const { MxCallout, MxSnackbar, MxConfirmDialog } = K;
function Pane({ theme }) {
  return (
    <div className="mx-pane" data-theme={theme === 'light' ? 'light' : undefined}>
      <p className="mx-h">Callouts</p>
      <div className="stack">
        <MxCallout tone="noDue" title="Nothing due">You’ve reviewed everything today — check back later.</MxCallout>
        <MxCallout tone="warning">Changing the app icon may remove your home-screen shortcuts.</MxCallout>
        <MxCallout tone="destructive" title="Destructive action">Restore will overwrite your current learning data.</MxCallout>
      </div>
      <p className="mx-h">Snackbars</p>
      <div className="stack">
        <MxSnackbar tone="success" action="Undo">Deleted deck “Topic 3”</MxSnackbar>
        <MxSnackbar tone="error">Couldn’t save session — your data is safe</MxSnackbar>
      </div>
      <p className="mx-h">Confirm dialog — high-risk (inline)</p>
      <div style={{ position: 'relative', height: 300, borderRadius: 16, overflow: 'hidden', border: 'var(--mx-border-subtle)' }}>
        <MxConfirmDialog variant="highRisk" title="Restore data?"
          message="This backup will overwrite all current decks, cards, and SRS progress."
          confirmLabel="Restore" cancelLabel="Cancel" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<div className="mx-grid"><Pane theme="dark"/><Pane theme="light"/></div>);
setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
